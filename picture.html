<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Profile Picture Designer</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 20px;
      border-radius: 20px;
      background: #141414;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      width: 320px;
    }

    h2 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    .preview {
      width: 250px;
      height: 250px;
      border-radius: 50%;
      overflow: hidden;
      margin: 20px auto;
      border: 4px solid #333;
      background: radial-gradient(circle, #222, #000);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 25px rgba(0,0,0,0.8);
      transition: 0.3s;
    }

    .preview:hover {
      transform: scale(1.03);
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    input[type="file"] {
      margin-top: 10px;
      color: #ccc;
    }

    .controls {
      margin-top: 15px;
    }

    .controls label {
      font-size: 12px;
      display: block;
      margin-top: 10px;
    }

    .controls input {
      width: 100%;
    }

    button {
      margin-top: 12px;
      padding: 10px;
      width: 100%;
      border: none;
      background: linear-gradient(135deg, #000, #333);
      color: #fff;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
    }

    button:hover {
      background: linear-gradient(135deg, #222, #555);
    }

    .download {
      background: linear-gradient(135deg, #0a84ff, #0051ff);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🔥 Profile Picture Pro</h2>

    <div class="preview" id="preview">
      <img id="image" src="https://images.pexels.com/photos/20454420/pexels-photo-20454420.jpeg" alt="Upload Image" />
    </div>

    <input type="file" id="upload" accept="image/*" />

    <div class="controls">
      <label>Brightness</label>
      <input type="range" id="brightness" min="50" max="150" value="100" />

      <label>Contrast</label>
      <input type="range" id="contrast" min="50" max="150" value="100" />

      <label>Saturation</label>
      <input type="range" id="saturation" min="50" max="150" value="100" />
    </div>

    <button onclick="applyBlackTheme()">✨ Black Profile Style</button>
    <button onclick="addGlow()">💡 Add Glow Effect</button>
    <button class="download" onclick="downloadImage()">⬇ Download</button>
  </div>

  <script>
    const upload = document.getElementById('upload');
    const image = document.getElementById('image');

    const brightness = document.getElementById('brightness');
    const contrast = document.getElementById('contrast');
    const saturation = document.getElementById('saturation');

    upload.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          image.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    function updateFilters() {
      image.style.filter = `brightness(${brightness.value}%) contrast(${contrast.value}%) saturate(${saturation.value}%)`;
    }

    brightness.oninput = updateFilters;
    contrast.oninput = updateFilters;
    saturation.oninput = updateFilters;

    function applyBlackTheme() {
      image.style.filter = 'brightness(90%) contrast(120%) saturate(80%)';
      document.getElementById('preview').style.background = 'radial-gradient(circle, #111, #000)';
    }

    function addGlow() {
      document.getElementById('preview').style.boxShadow = '0 0 40px rgba(255,255,255,0.2)';
    }

    function downloadImage() {
      const canvas = document.createElement('canvas');
      canvas.width = 500;
      canvas.height = 500;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.src = image.src;

      img.onload = () => {
        ctx.drawImage(img, 0, 0, 500, 500);
        const link = document.createElement('a');
        link.download = 'profile.png';
        link.href = canvas.toDataURL();
        link.click();
      };
    }
  </script>
</body>
</html>
