<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Profile Designer Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00f2fe;
            --accent-glow: rgba(0, 242, 254, 0.5);
            --bg: #080a0f;
            --card: rgba(20, 25, 35, 0.8);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, #1a1f2c, var(--bg));
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .editor-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { 
            margin-bottom: 25px; 
            font-weight: 600; 
            letter-spacing: 1px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Profile Preview Section */
        .preview-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 25px;
        }

        .preview-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
            background: #000;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #image-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Controls Style */
        .controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label { font-size: 11px; color: #8e9aaf; text-transform: uppercase; font-weight: 600; }

        input[type="range"] {
            -webkit-appearance: none;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent);
        }

        /* Buttons Area */
        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-upload { background: #fff; color: #000; }
        .btn-preset { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-preset:hover { background: rgba(255,255,255,0.15); border-color: var(--accent); }

        .btn-download {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #000;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }

        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(0, 242, 254, 0.5); }

        #file-input { display: none; }
    </style>
</head>
<body>

<div class="editor-card">
    <h2>PRO DESIGNER</h2>

    <div class="preview-container">
        <div class="preview-circle" id="circle">
            <img id="image-preview" src="https://images.pexels.com/photos/20454420/pexels-photo-20454420.jpeg" crossorigin="anonymous">
        </div>
    </div>

    <label for="file-input" class="btn btn-upload" style="display: block; margin-bottom: 20px;">📷 Upload New Photo</label>
    <input type="file" id="file-input" accept="image/*">

    <div class="controls-grid">
        <div class="control-group">
            <label>Brightness</label>
            <input type="range" id="brightness" min="0" max="200" value="100">
        </div>
        <div class="control-group">
            <label>Contrast</label>
            <input type="range" id="contrast" min="0" max="200" value="100">
        </div>
        <div class="control-group">
            <label>Saturation</label>
            <input type="range" id="saturation" min="0" max="200" value="100">
        </div>
        <div class="control-group">
            <label>Hue (Color)</label>
            <input type="range" id="hue" min="0" max="360" value="0">
        </div>
        <div class="control-group">
            <label>Blur</label>
            <input type="range" id="blur" min="0" max="10" value="0">
        </div>
        <div class="control-group">
            <label>Sepia</label>
            <input type="range" id="sepia" min="0" max="100" value="0">
        </div>
    </div>

    <div class="button-stack">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn btn-preset" onclick="setPreset('dark')">🖤 Dark Mood</button>
            <button class="btn btn-preset" onclick="setPreset('vintage')">🎞 Vintage</button>
            <button class="btn btn-preset" onclick="setPreset('vibrant')">🌈 Vibrant</button>
            <button class="btn btn-preset" onclick="resetFilters()">🔄 Reset</button>
        </div>
        <button class="btn btn-download" onclick="downloadCircularImage()">⬇ Download HD Profile</button>
    </div>
</div>

<script>
    const img = document.getElementById('image-preview');
    const fileInput = document.getElementById('file-input');
    const inputs = document.querySelectorAll('input[type="range"]');

    // Filter Logic
    function applyFilters() {
        const filters = {
            brightness: document.getElementById('brightness').value,
            contrast: document.getElementById('contrast').value,
            saturation: document.getElementById('saturation').value,
            hue: document.getElementById('hue').value,
            blur: document.getElementById('blur').value,
            sepia: document.getElementById('sepia').value
        };
        
        img.style.filter = `
            brightness(${filters.brightness}%) 
            contrast(${filters.contrast}%) 
            saturate(${filters.saturation}%) 
            hue-rotate(${filters.hue}deg) 
            blur(${filters.blur}px) 
            sepia(${filters.sepia}%)
        `;
    }

    inputs.forEach(input => input.addEventListener('input', applyFilters));

    // File Upload
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            img.src = URL.createObjectURL(file);
            resetFilters();
        }
    };

    // Presets
    function setPreset(type) {
        resetFilters();
        if (type === 'dark') {
            document.getElementById('brightness').value = 70;
            document.getElementById('contrast').value = 140;
            document.getElementById('saturation').value = 50;
        } else if (type === 'vintage') {
            document.getElementById('sepia').value = 60;
            document.getElementById('contrast').value = 90;
        } else if (type === 'vibrant') {
            document.getElementById('saturation').value = 170;
            document.getElementById('contrast').value = 110;
        }
        applyFilters();
    }

    function resetFilters() {
        inputs.forEach(input => {
            input.value = input.id === 'hue' || input.id === 'blur' || input.id === 'sepia' ? 0 : 100;
        });
        applyFilters();
    }

    // High-Quality Circular Download
    function downloadCircularImage() {
        const canvas = document.createElement('canvas');
        const size = 800; // High resolution
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Draw Circle Mask
        ctx.beginPath();
        ctx.arc(size/2, size/2, size/2, 0, Math.PI * 2);
        ctx.closePath();
        ctx.clip();

        // Apply Filters to Canvas
        ctx.filter = getComputedStyle(img).filter;

        // Draw Image
        const tempImg = new Image();
        tempImg.crossOrigin = "anonymous";
        tempImg.src = img.src;
        
        tempImg.onload = () => {
            // Logic to cover the circle (Center Crop)
            const aspect = tempImg.width / tempImg.height;
            let drawWidth, drawHeight, offsetX, offsetY;

            if (aspect > 1) {
                drawHeight = size;
                drawWidth = size * aspect;
                offsetX = -(drawWidth - size) / 2;
                offsetY = 0;
            } else {
                drawWidth = size;
                drawHeight = size / aspect;
                offsetX = 0;
                offsetY = -(drawHeight - size) / 2;
            }

            ctx.drawImage(tempImg, offsetX, offsetY, drawWidth, drawHeight);
            
            const link = document.createElement('a');
            link.download = 'pro-avatar.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };
    }
</script>

</body>
</html>
