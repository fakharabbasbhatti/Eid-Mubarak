<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Typewriter Experience</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #020617;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* Animated Background Particles Effect */
        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            z-index: -1;
        }

        /* The Premium Card */
        .glass-box {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            max-width: 800px;
            width: 90%;
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-box:hover {
            border-color: #6366f1;
            box-shadow: 0 0 50px rgba(99, 102, 241, 0.2);
        }

        .badge {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 25px;
            display: inline-block;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        /* The Typewriter Text with Animated Gradient */
        .type-container {
            min-height: 80px;
            margin-top: 20px;
        }

        #type-text {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #fff, #6366f1, #a855f7, #fff);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 5s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0%; }
            100% { background-position: 100%; }
        }

        .cursor {
            font-size: 3.5rem;
            color: #6366f1;
            animation: blink 0.8s infinite;
            margin-left: 5px;
            font-weight: 200;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            #type-text { font-size: 2rem; }
            .glass-box { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="glass-box" id="card">
        <div class="badge">Portfolio v3.0</div>
        <h1>HELLO, I'M A</h1>
        <div class="type-container">
            <span id="type-text"></span><span class="cursor">|</span>
        </div>
    </div>

<script>
    const textArray = [
        "Creative Designer",
        "Frontend Expert",
        "React Enthusiast",
        "Problem Solver"
    ];

    let index = 0;
    let charIndex = 0;
    let isDeleting = false;

    function typeEffect() {
        const display = document.getElementById("type-text");
        const currentWord = textArray[index];

        if (isDeleting) {
            display.textContent = currentWord.substring(0, charIndex--);
        } else {
            display.textContent = currentWord.substring(0, charIndex++);
        }

        let speed = isDeleting ? 40 : 100;

        if (!isDeleting && charIndex === currentWord.length + 1) {
            isDeleting = true;
            speed = 2500; // Pause at full word
        } else if (isDeleting && charIndex === 0) {
            isDeleting = false;
            index = (index + 1) % textArray.length;
            speed = 800; // Pause before new word
        }

        setTimeout(typeEffect, speed);
    }

    // Mouse Tilt Effect
    const card = document.getElementById('card');
    document.addEventListener('mousemove', (e) => {
        let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
        let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
        card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    document.addEventListener("DOMContentLoaded", typeEffect);
</script>

</body>
</html>
