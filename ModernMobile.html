<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Mobile UI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --phone-border: #222;
            --screen-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Mobile Frame */
        .phone-case {
            width: 320px;
            height: 650px;
            background: var(--phone-border);
            border-radius: 40px;
            padding: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            border: 4px solid #333;
        }

        /* Screen Design */
        .phone-screen {
            width: 100%;
            height: 100%;
            background: var(--screen-bg);
            border-radius: 30px;
            overflow: hidden;
            position: relative;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Notch Area */
        .notch {
            width: 150px;
            height: 25px;
            background: var(--phone-border);
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            font-size: 12px;
            margin-top: 5px;
        }

        /* App Icons Area */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 30px 15px;
            text-align: center;
        }

        .app-icon {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin: 0 auto;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-icon:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.3);
        }

        .app-label {
            font-size: 10px;
            margin-top: 5px;
            display: block;
        }

        /* Time/Weather Display */
        .widget-clock {
            text-align: center;
            margin-top: 40px;
        }

        .widget-clock h1 {
            font-size: 48px;
            font-weight: 200;
            margin-bottom: 0;
        }

        /* Bottom Dock */
        .dock {
            position: absolute;
            bottom: 15px;
            left: 10px;
            right: 10px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="phone-case">
        <div class="notch"></div>
        <div class="phone-screen">
            <!-- Status Bar -->
            <div class="status-bar">
                <span id="current-time">12:00</span>
                <div class="status-icons">
                    <i class="fas fa-signal"></i>
                    <i class="fas fa-wifi mx-1"></i>
                    <i class="fas fa-battery-full"></i>
                </div>
            </div>

            <!-- Clock Widget -->
            <div class="widget-clock">
                <h1 id="big-time">12:00</h1>
                <p>Thursday, May 7</p>
            </div>

            <!-- Apps Grid -->
            <div class="app-grid">
                <div class="app-item">
                    <div class="app-icon text-primary"><i class="fab fa-facebook-f"></i></div>
                    <span class="app-label">Facebook</span>
                </div>
                <div class="app-item">
                    <div class="app-icon text-danger"><i class="fab fa-youtube"></i></div>
                    <span class="app-label">YouTube</span>
                </div>
                <div class="app-item">
                    <div class="app-icon text-success"><i class="fab fa-whatsapp"></i></div>
                    <span class="app-label">WhatsApp</span>
                </div>
                <div class="app-item">
                    <div class="app-icon text-info"><i class="fab fa-twitter"></i></div>
                    <span class="app-label">Twitter</span>
                </div>
                <div class="app-item">
                    <div class="app-icon" style="color: #E1306C;"><i class="fab fa-instagram"></i></div>
                    <span class="app-label">Instagram</span>
                </div>
                <div class="app-item">
                    <div class="app-icon text-warning"><i class="fas fa-envelope"></i></div>
                    <span class="app-label">Gmail</span>
                </div>
            </div>

            <!-- Dock -->
            <div class="dock">
                <div class="app-icon"><i class="fas fa-phone text-success"></i></div>
                <div class="app-icon"><i class="fas fa-comment text-info"></i></div>
                <div class="app-icon"><i class="fas fa-globe text-primary"></i></div>
                <div class="app-icon"><i class="fas fa-camera text-light"></i></div>
            </div>
        </div>
    </div>

    <script>
        // Real-time clock function
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            
            hours = hours < 10 ? '0' + hours : hours;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            const timeString = hours + ':' + minutes;
            document.getElementById('current-time').textContent = timeString;
            document.getElementById('big-time').textContent = timeString;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
