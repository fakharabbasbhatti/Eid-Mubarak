<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  display: flex;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #2c3e50;
  color: white;
  height: 100vh;
  padding: 20px;
  transition: 0.3s;
}

.sidebar h2 {
  margin-bottom: 20px;
}

.sidebar ul {
  list-style: none;
}

.sidebar ul li {
  padding: 10px;
  cursor: pointer;
}

.sidebar ul li:hover {
  background: #34495e;
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Navbar */
.navbar {
  display: flex;
  align-items: center;
  gap: 15px;
}

#toggleBtn {
  padding: 5px 10px;
  font-size: 18px;
  cursor: pointer;
}

/* Cards */
.cards {
  display: flex;
  gap: 20px;
  margin: 20px 0;
}

.card {
  flex: 1;
  background: #3498db;
  color: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.card span {
  font-size: 24px;
  font-weight: bold;
}

/* Table */
.table-section {
  background: #f4f4f4;
  padding: 20px;
  border-radius: 10px;
}

table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}

table, th, td {
  border: 1px solid #ccc;
}

th, td {
  padding: 10px;
  text-align: left;
}

/* Hide Sidebar */
.sidebar.hide {
  width: 0;
  overflow: hidden;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <h2>MyDashboard</h2>
  <ul>
    <li>Home</li>
    <li>Analytics</li>
    <li>Users</li>
    <li>Settings</li>
  </ul>
</div>

<!-- Main Content -->
<div class="main">

  <!-- Navbar -->
  <div class="navbar">
    <button id="toggleBtn">☰</button>
    <h2>Dashboard</h2>
  </div>

  <!-- Cards -->
  <div class="cards">
    <div class="card">Users<br><span>120</span></div>
    <div class="card">Sales<br><span>$530</span></div>
    <div class="card">Orders<br><span>75</span></div>
  </div>

  <!-- Table -->
  <div class="table-section">
    <h3>Recent Users</h3>
    <table>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
      </tr>
      <tr>
        <td>Ali</td>
        <td>ali@email.com</td>
        <td>Active</td>
      </tr>
      <tr>
        <td>Ahmed</td>
        <td>ahmed@email.com</td>
        <td>Inactive</td>
      </tr>
    </table>
  </div>

</div>

<script>
const toggleBtn = document.getElementById("toggleBtn");
const sidebar = document.getElementById("sidebar");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("hide");
});
</script>

</body>
</html>
