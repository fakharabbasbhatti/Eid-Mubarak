<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Dashboard</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  display: flex;
  background: #f1f5f9;
}

/* Sidebar */
.sidebar {
  width: 240px;
  background: linear-gradient(180deg, #1e293b, #0f172a);
  color: white;
  height: 100vh;
  padding: 20px;
  transition: 0.3s;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar ul {
  list-style: none;
}

.sidebar ul li {
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.sidebar ul li:hover {
  background: rgba(255,255,255,0.1);
}

/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Navbar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.navbar-left {
  display: flex;
  align-items: center;
  gap: 15px;
}

#toggleBtn {
  font-size: 20px;
  cursor: pointer;
  background: #0ea5e9;
  border: none;
  color: white;
  padding: 6px 12px;
  border-radius: 6px;
}

.user {
  background: white;
  padding: 8px 15px;
  border-radius: 20px;
  font-size: 14px;
}

/* Cards */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.card {
  padding: 20px;
  border-radius: 12px;
  color: white;
  position: relative;
  overflow: hidden;
}

.card h3 {
  font-size: 14px;
  opacity: 0.8;
}

.card span {
  font-size: 26px;
  font-weight: bold;
}

.card:nth-child(1) { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
.card:nth-child(2) { background: linear-gradient(135deg, #22c55e, #15803d); }
.card:nth-child(3) { background: linear-gradient(135deg, #f59e0b, #b45309); }
.card:nth-child(4) { background: linear-gradient(135deg, #ef4444, #991b1b); }

/* Table */
.table-box {
  margin-top: 30px;
  background: white;
  padding: 20px;
  border-radius: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th {
  background: #f1f5f9;
  text-align: left;
}

th, td {
  padding: 12px;
}

tr {
  border-bottom: 1px solid #ddd;
}

tr:hover {
  background: #f9fafb;
}

/* Responsive */
@media(max-width: 768px) {
  .sidebar {
    position: absolute;
    left: -240px;
  }

  .sidebar.show {
    left: 0;
  }
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <h2>🚀 Admin</h2>
  <ul>
    <li>🏠 Dashboard</li>
    <li>📊 Analytics</li>
    <li>👥 Users</li>
    <li>⚙ Settings</li>
  </ul>
</div>

<!-- Main -->
<div class="main">

  <!-- Navbar -->
  <div class="navbar">
    <div class="navbar-left">
      <button id="toggleBtn">☰</button>
      <h2>Dashboard</h2>
    </div>
    <div class="user">👤 Admin</div>
  </div>

  <!-- Cards -->
  <div class="cards">
    <div class="card">
      <h3>Total Users</h3>
      <span>1,240</span>
    </div>
    <div class="card">
      <h3>Revenue</h3>
      <span>$8,540</span>
    </div>
    <div class="card">
      <h3>Orders</h3>
      <span>320</span>
    </div>
    <div class="card">
      <h3>Pending</h3>
      <span>24</span>
    </div>
  </div>

  <!-- Table -->
  <div class="table-box">
    <h3>Recent Activity</h3>
    <table>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
      </tr>
      <tr>
        <td>Ali</td>
        <td>ali@email.com</td>
        <td>Active</td>
      </tr>
      <tr>
        <td>Ahmed</td>
        <td>ahmed@email.com</td>
        <td>Inactive</td>
      </tr>
      <tr>
        <td>Usman</td>
        <td>usman@email.com</td>
        <td>Active</td>
      </tr>
    </table>
  </div>

</div>

<script>
const toggleBtn = document.getElementById("toggleBtn");
const sidebar = document.getElementById("sidebar");

toggleBtn.addEventListener("click", () => {
  sidebar.classList.toggle("show");
});
</script>

</body>
</html>
