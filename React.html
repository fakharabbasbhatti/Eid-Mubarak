<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate All-in-One Plugin</title>

    <!-- External CSS Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* Modern CSS Variables for Easy Customization */
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-light: #f8f9fa;
            --bg-dark: #0f172a;
            --card-light: #ffffff;
            --card-dark: #1e293b;
            --text-light: #1f2937;
            --text-dark: #f3f4f6;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Base Styles */
        body {
            background-color: var(--bg-light);
            color: var(--text-light);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            transition: var(--transition);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        body.dark-mode {
            background-color: var(--bg-dark);
            color: var(--text-dark);
        }

        /* Floating Theme Toggle */
        .theme-switch {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 1000;
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* The Hero Card */
        .plugin-card {
            background: var(--card-light);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            transition: var(--transition);
            position: relative;
        }

        .dark-mode .plugin-card {
            background: var(--card-dark);
            border-color: rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .plugin-card:hover {
            transform: translateY(-10px);
        }

        .icon-wrapper {
            background: var(--primary-gradient);
            width: 90px;
            height: 90px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            color: white;
            font-size: 2.5rem;
            transform: rotate(-5deg);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }

        /* Buttons */
        .btn-launch {
            background: var(--primary-gradient);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: var(--transition);
            width: 100%;
        }

        .btn-launch:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }

        /* Modal Customization */
        .modal-content {
            border-radius: 24px;
            border: none;
            overflow: hidden;
        }

        .dark-mode .modal-content {
            background: var(--card-dark);
            color: var(--text-dark);
        }

        .counter-display {
            font-size: 4rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Success Message Toast */
        .custom-toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            display: none;
            z-index: 2000;
            animation: fadeInUp 0.5s;
        }
    </style>
</head>
<body id="mainBody">

    <!-- Theme Switcher -->
    <button class="theme-switch" onclick="toggleDarkMode()" title="Toggle Theme">
        <i id="themeIcon" class="fas fa-moon"></i>
    </button>

    <!-- Main Plugin Card -->
    <div class="container d-flex justify-content-center">
        <div class="plugin-card animate__animated animate__fadeInUp">
            <div class="icon-wrapper">
                <i class="fas fa-rocket"></i>
            </div>
            <h2 class="fw-bold mb-2">Turbo Plugin</h2>
            <p class="text-muted mb-4 dark-mode-text">Optimize your workflow with our smart automation tool.</p>
            <button class="btn btn-launch" onclick="showPluginModal()">
                <i class="fas fa-play-circle me-2"></i> Launch Application
            </button>
        </div>
    </div>

    <!-- Interactive Modal -->
    <div class="modal fade" id="mainModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content animate__animated animate__zoomIn">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Command Center</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-5">
                    <p class="text-muted">Dynamic Session Counter</p>
                    <h1 id="sessionCounter" class="counter-display">0</h1>
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <button class="btn btn-outline-danger px-4" onclick="adjustCounter(-1)">
                            <i class="fas fa-minus"></i>
                        </button>
                        <button class="btn btn-outline-success px-4" onclick="adjustCounter(1)">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light w-100 py-2" onclick="finishTask()">
                        Complete & Save
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Simple Toast -->
    <div id="toast" class="custom-toast">
        <i class="fas fa-check-circle me-2"></i> Action Completed Successfully!
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let counterValue = 0;
        const body = document.getElementById('mainBody');
        const themeIcon = document.getElementById('themeIcon');
        const counterText = document.getElementById('sessionCounter');

        // Toggle Dark Mode Functionality
        function toggleDarkMode() {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        // Modal Control
        function showPluginModal() {
            const myModal = new bootstrap.Modal(document.getElementById('mainModal'));
            myModal.show();
        }

        // Counter Logic
        function adjustCounter(val) {
            counterValue += val;
            counterText.innerText = counterValue;
            
            // Add a little pop animation on change
            counterText.classList.remove('animate__animated', 'animate__pulse');
            void counterText.offsetWidth; // Trigger reflow
            counterText.classList.add('animate__animated', 'animate__pulse');
        }

        // Save Action & Toast Notification
        function finishTask() {
            const modalElement = document.getElementById('mainModal');
            const modalInstance = bootstrap.Modal.getInstance(modalElement);
            modalInstance.hide();

            // Show Custom Toast
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);

            console.log("Task Finished with value:", counterValue);
        }
    </script>
</body>
</html>
