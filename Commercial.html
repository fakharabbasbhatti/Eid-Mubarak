<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LendFlow Pro</title>

<style>
:root {
  --bg: #0f172a;
  --card: rgba(255,255,255,0.05);
  --text: white;
  --primary: #3B82F6;
}

.light {
  --bg: #ffffff;
  --card: #f3f4f6;
  --text: #111;
}

body {
  margin:0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

header {
  display:flex;
  justify-content:space-between;
  padding:20px 10%;
}

nav a {
  margin-left:20px;
  color:var(--text);
  text-decoration:none;
}

.toggle {
  cursor:pointer;
}

.hero {
  text-align:center;
  padding:120px 10%;
}

.hero h1 {
  font-size:48px;
}

.hero span {
  color: var(--primary);
}

.hero button {
  margin-top:20px;
  padding:12px 30px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.features {
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  padding:60px 10%;
}

.card {
  width:280px;
  padding:20px;
  background:var(--card);
  border-radius:12px;
  transition:0.3s;
}

.card:hover {
  transform:translateY(-10px);
}

.stats {
  display:flex;
  justify-content:center;
  gap:50px;
  padding:60px;
}

.stat {
  text-align:center;
}

.testimonial {
  text-align:center;
  padding:80px 20%;
}

.form {
  text-align:center;
  padding:60px;
}

input {
  padding:10px;
  width:250px;
  border-radius:5px;
  border:none;
}

button.submit {
  padding:10px 20px;
  margin-left:10px;
  background:var(--primary);
  color:white;
  border:none;
  border-radius:5px;
}

.fade {
  opacity:0;
  transform:translateY(20px);
  transition:1s;
}

.show {
  opacity:1;
  transform:translateY(0);
}

footer {
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h2>LendFlow</h2>
  <div>
    <span class="toggle" onclick="toggleMode()">🌙</span>
  </div>
</header>

<section class="hero fade">
  <h1>
    Commercial lending should not depend on 
    <span>spreadsheets, inboxes, and manual follow-up.</span>
  </h1>
  <button>Start Free</button>
</section>

<section class="features">
  <div class="card fade">⚡ Automation</div>
  <div class="card fade">📊 Analytics</div>
  <div class="card fade">🔒 Security</div>
</section>

<section class="stats fade">
  <div class="stat">
    <h2>10K+</h2>
    <p>Users</p>
  </div>
  <div class="stat">
    <h2>95%</h2>
    <p>Efficiency</p>
  </div>
  <div class="stat">
    <h2>24/7</h2>
    <p>Support</p>
  </div>
</section>

<section class="testimonial fade">
  <p>"This platform completely transformed our lending workflow."</p>
</section>

<section class="form fade">
  <h3>Join Early Access</h3>
  <input type="email" placeholder="Enter your email">
  <button class="submit" onclick="submitForm()">Join</button>
</section>

<footer>
  © 2026 LendFlow
</footer>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}

function submitForm() {
  alert("You're on the list 🚀");
}

// Scroll animation
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll('.fade').forEach(el => {
  observer.observe(el);
});
</script>

</body>
</html>
