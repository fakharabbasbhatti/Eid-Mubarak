<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redux Counter - One File</title>

<!-- Redux CDN -->
<script src="https://unpkg.com/redux@4.2.1/dist/redux.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
    margin-top:100px;
}

.container{
    background:white;
    width:300px;
    margin:auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:20px;
}

#value{
    font-size:40px;
    margin:20px 0;
}

button{
    padding:10px 20px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
    border:none;
    border-radius:5px;
    background:#007BFF;
    color:white;
}

button:hover{
    background:#0056b3;
}
</style>

</head>

<body>

<div class="container">
<h1>Redux Counter</h1>

<h2 id="value">0</h2>

<button id="increment">+</button>
<button id="decrement">-</button>
</div>

<script>

// Action Types
const INCREMENT = "INCREMENT";
const DECREMENT = "DECREMENT";

// Reducer
function counterReducer(state = 0, action){
    switch(action.type){
        case INCREMENT:
            return state + 1;

        case DECREMENT:
            return state - 1;

        default:
            return state;
    }
}

// Create Store
const store = Redux.createStore(counterReducer);

// Render UI
function render(){
    document.getElementById("value").innerText = store.getState();
}

// Subscribe
store.subscribe(render);

// Initial render
render();

// Buttons
document.getElementById("increment").onclick = function(){
    store.dispatch({type: INCREMENT});
}

document.getElementById("decrement").onclick = function(){
    store.dispatch({type: DECREMENT});
}

</script>

</body>
</html>
