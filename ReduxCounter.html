<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Professional Redux 3D Counter</title>

<script src="https://unpkg.com/redux@4.2.1/dist/redux.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
overflow:hidden;
color:white;
}

/* animated background */
body::before{
content:"";
position:absolute;
width:200%;
height:200%;
background:radial-gradient(circle,#3b82f6,#0f172a,#020617);
animation:rotate 15s linear infinite;
}

@keyframes rotate{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* floating particles */

.particle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
opacity:.5;
animation:float 10s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:0
}
50%{
opacity:1
}
100%{
transform:translateY(-100vh);
opacity:0
}
}

/* glass card */

.container{
position:relative;
z-index:2;
width:360px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 30px 60px rgba(0,0,0,.5);
text-align:center;
transition:transform .2s;
transform-style:preserve-3d;
}

h1{
font-size:28px;
margin-bottom:25px;
letter-spacing:1px;
}

/* counter */

#value{
font-size:70px;
margin:25px 0;
font-weight:bold;
transition:transform .25s;
}

/* buttons */

.buttons{
display:flex;
justify-content:center;
gap:25px;
}

button{
width:70px;
height:70px;
font-size:30px;
border:none;
border-radius:16px;
cursor:pointer;
color:white;
background:linear-gradient(145deg,#2563eb,#06b6d4);
box-shadow:
0 10px 20px rgba(0,0,0,.5),
inset 0 -4px 10px rgba(0,0,0,.3);
transition:all .15s;
}

button:hover{
transform:translateY(-3px);
}

button:active{
transform:translateY(6px);
box-shadow:
0 4px 10px rgba(0,0,0,.4),
inset 0 4px 8px rgba(0,0,0,.3);
}

</style>
</head>

<body>

<div class="container" id="card">

<h1>Redux 3D Counter</h1>

<div id="value">0</div>

<div class="buttons">
<button id="dec">−</button>
<button id="inc">+</button>
</div>

</div>

<script>

/* floating particles */

for(let i=0;i<25;i++){

let p=document.createElement("div")
p.className="particle"

p.style.left=Math.random()*100+"%"
p.style.animationDuration=(5+Math.random()*10)+"s"

document.body.appendChild(p)

}

/* Redux */

const INCREMENT="INCREMENT"
const DECREMENT="DECREMENT"

function reducer(state=0,action){

switch(action.type){

case INCREMENT:
return state+1

case DECREMENT:
return state-1

default:
return state

}

}

const store=Redux.createStore(reducer)

const value=document.getElementById("value")

function render(){

value.innerText=store.getState()

value.style.transform="scale(1.25)"

setTimeout(()=>{
value.style.transform="scale(1)"
},200)

}

store.subscribe(render)

render()

document.getElementById("inc").onclick=()=>{
store.dispatch({type:INCREMENT})
}

document.getElementById("dec").onclick=()=>{
store.dispatch({type:DECREMENT})
}

/* 3D card tilt effect */

const card=document.getElementById("card")

document.addEventListener("mousemove",(e)=>{

let x=(window.innerWidth/2-e.clientX)/25
let y=(window.innerHeight/2-e.clientY)/25

card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`

})

</script>

</body>
</html>
