<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Studio Pro | AI Editor</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #ff4ecd;
            --secondary: #00d2ff;
            --bg-dark: #0f1016;
            --card-bg: #1e1f29;
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
        }

        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 350px;
            background: var(--card-bg);
            padding: 30px;
            border-right: 1px solid #333;
            height: 100vh;
            position: sticky;
            top: 0;
            overflow-y: auto;
        }

        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Styling Components */
        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .preview-container {
            position: relative;
            max-width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background: #000;
        }

        canvas {
            max-width: 100%;
            display: block;
        }

        .btn-glow {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
            transition: 0.3s;
            width: 100%;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 78, 205, 0.4);
        }

        .preset-badge {
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 20px;
            background: #333;
            font-size: 0.8rem;
            transition: 0.2s;
            display: inline-block;
            margin: 3px;
        }

        .preset-badge:hover, .preset-badge.active {
            background: var(--primary);
            color: white;
        }

        input[type="range"] { accent-color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <div class="sidebar">
        <h3 class="mb-4 text-white"><i class="fa-solid fa-wand-sparkles me-2"></i>Studio</h3>
        
        <div class="mb-4">
            <label class="form-label d-block">Upload Image</label>
            <input type="file" id="upload" class="form-control form-control-sm bg-dark text-white border-secondary">
        </div>

        <div class="glass-box">
            <label class="form-label small">Styles Presets</label>
            <div>
                <span class="preset-badge active" onclick="setPreset('default')">Classic</span>
                <span class="preset-badge" onclick="setPreset('cyber')">Cyberpunk</span>
                <span class="preset-badge" onclick="setPreset('manga')">B&W Manga</span>
                <span class="preset-badge" onclick="setPreset('kawaii')">Kawaii</span>
            </div>
        </div>

        <div class="glass-box">
            <label class="form-label small">Manual Tuning</label>
            <div class="mb-3">
                <small>Vibrancy</small>
                <input type="range" id="vibrancy" class="form-range" min="1" max="2.5" step="0.1" value="1.4">
            </div>
            <div class="mb-3">
                <small>Edge Intensity</small>
                <input type="range" id="edge" class="form-range" min="0" max="100" step="10" value="40">
            </div>
            <div class="mb-3">
                <small>Smoothness</small>
                <input type="range" id="smooth" class="form-range" min="0" max="10" step="1" value="0">
            </div>
        </div>

        <button class="btn-glow mb-3" onclick="processImage()">
            <i class="fa-solid fa-bolt me-2"></i> Render Artwork
        </button>
        
        <button class="btn btn-outline-info w-100 btn-sm" onclick="downloadImage()">
            <i class="fa-solid fa-download me-2"></i> Export PNG
        </button>
    </div>

    <div class="main-content">
        <div id="welcome-msg" class="text-center mt-5">
            <i class="fa-regular fa-image fa-4x mb-3 text-secondary"></i>
            <h2>Ready to Transform?</h2>
            <p class="text-muted">Upload a photo to see the anime magic.</p>
        </div>

        <div class="preview-container" id="preview-wrap" style="display:none;">
            <canvas id="canvas"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let originalImg = new Image();

    document.getElementById('upload').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg.onload = () => {
                const maxW = 900;
                const ratio = maxW / originalImg.width;
                canvas.width = Math.min(originalImg.width, maxW);
                canvas.height = originalImg.height * (canvas.width / originalImg.width);
                
                ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
                document.getElementById('welcome-msg').style.display = 'none';
                document.getElementById('preview-wrap').style.display = 'block';
            };
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function setPreset(type) {
        document.querySelectorAll('.preset-badge').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        const v = document.getElementById('vibrancy');
        const e = document.getElementById('edge');

        if(type === 'cyber') { v.value = 2.0; e.value = 80; }
        else if(type === 'manga') { v.value = 1.0; e.value = 100; }
        else if(type === 'kawaii') { v.value = 1.6; e.value = 10; }
        else { v.value = 1.4; e.value = 40; }
        
        processImage(type);
    }

    function processImage(preset = 'default') {
        if (!originalImg.src) return;

        // Reset canvas
        ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
        
        let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        let data = imageData.data;
        let v = parseFloat(document.getElementById('vibrancy').value);
        let smooth = parseInt(document.getElementById('smooth').value);

        for (let i = 0; i < data.length; i += 4) {
            // Apply Vibrancy
            data[i] *= v;     // R
            data[i+1] *= v;   // G
            data[i+2] *= (v * 1.1); // B (Blue boost for anime feel)

            // Cel-Shading (Posterization)
            data[i] = Math.floor(data[i] / 32) * 32;
            data[i+1] = Math.floor(data[i+1] / 32) * 32;
            data[i+2] = Math.floor(data[i+2] / 32) * 32;

            if(preset === 'manga') {
                let gray = (data[i] + data[i+1] + data[i+2]) / 3;
                data[i] = data[i+1] = data[i+2] = gray > 120 ? 255 : 50;
            }
        }
        ctx.putImageData(imageData, 0, 0);

        // Edge Detection / Contrast Layer
        let edgeVal = document.getElementById('edge').value;
        ctx.globalCompositeOperation = "multiply";
        ctx.filter = `contrast(${100 + parseInt(edgeVal)}%) brightness(110%) blur(${smooth}px)`;
        ctx.drawImage(canvas, 0, 0);
        ctx.filter = "none";
        ctx.globalCompositeOperation = "source-over";
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'anime-art.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
