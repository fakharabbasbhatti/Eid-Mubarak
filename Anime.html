<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Style Generator</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #ff4ecd, #5a8cff);
      min-height: 100vh;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    canvas {
      max-width: 100%;
      border-radius: 15px;
      margin-top: 15px;
    }

    .btn-custom {
      background: #ff4ecd;
      border: none;
      font-weight: bold;
    }

    .btn-custom:hover {
      background: #ff2bb5;
    }
  </style>
</head>

<body>

<div class="container py-5 text-center">
  <h1 class="mb-4">
    <i class="fa-solid fa-wand-magic-sparkles"></i>
    Anime Style Generator
  </h1>

  <div class="card p-4 bg-dark text-white">
    
    <input type="file" id="upload" class="form-control mb-3">

    <button class="btn btn-custom mb-3" onclick="applyAnimeEffect()">
      <i class="fa-solid fa-bolt"></i> Generate Anime Style
    </button>

    <canvas id="canvas"></canvas>

  </div>
</div>

<script>
let img = new Image();
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

document.getElementById("upload").addEventListener("change", function(e) {
  const reader = new FileReader();

  reader.onload = function(event) {
    img.onload = function() {
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
    }
    img.src = event.target.result;
  }

  reader.readAsDataURL(e.target.files[0]);
});

function applyAnimeEffect() {
  ctx.drawImage(img, 0, 0);

  let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {

    // Increase saturation & contrast
    let r = data[i];
    let g = data[i + 1];
    let b = data[i + 2];

    // Boost colors (anime vibrant look)
    r = r * 1.3;
    g = g * 1.2;
    b = b * 1.4;

    // Simple cel-shading effect (reduce tones)
    r = Math.floor(r / 32) * 32;
    g = Math.floor(g / 32) * 32;
    b = Math.floor(b / 32) * 32;

    // Clamp values
    data[i] = Math.min(255, r);
    data[i + 1] = Math.min(255, g);
    data[i + 2] = Math.min(255, b);
  }

  ctx.putImageData(imageData, 0, 0);

  // Add simple edge effect
  ctx.globalCompositeOperation = "multiply";
  ctx.filter = "contrast(150%) grayscale(100%)";
  ctx.drawImage(canvas, 0, 0);
  ctx.filter = "none";
  ctx.globalCompositeOperation = "source-over";
}
</script>

</body>
</html>
