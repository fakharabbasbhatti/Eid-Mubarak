<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Pro - 8+ Users</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --wa-bg: #f0f2f5;
      --wa-green: #00a884;
      --wa-header: #f0f2f5;
      --wa-nav-icon: #54656f;
      --sent-msg: #d9fdd3;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #dadbd3;
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }

    .chat-container {
      height: 100vh;
      width: 100%;
      background: white;
      display: flex;
    }

    /* Left Navbar (Vertical Icons) */
    .nav-rail {
      width: 60px;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 15px 0;
      border-right: 1px solid #ddd;
    }

    .nav-item {
      font-size: 20px;
      color: var(--wa-nav-icon);
      margin-bottom: 25px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .nav-item.active { background: #e1e3e5; color: #111b21; }
    .nav-item:hover { background: #e1e3e5; }

    /* Sidebar & Content */
    .sidebar { width: 350px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: #fff; }
    .sidebar-header { background: #f0f2f5; padding: 15px; font-weight: 700; font-size: 20px; display: flex; justify-content: space-between; }
    
    .chat-list { flex: 1; overflow-y: auto; }
    .item-row { display: flex; padding: 12px; cursor: pointer; border-bottom: 1px solid #f2f2f2; transition: 0.2s; }
    .item-row:hover, .item-row.active { background: #f5f6f6; }
    
    .avatar { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; }
    .status-circle { border: 2px solid var(--wa-green); padding: 2px; }

    /* Main Area */
    .main-view { flex: 1; background: #efeae2; display: flex; flex-direction: column; position: relative; }
    .main-view::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      opacity: 0.08; pointer-events: none;
    }

    .view-header { background: #f0f2f5; padding: 10px 20px; display: flex; align-items: center; z-index: 10; border-bottom: 1px solid #ddd; }
    .view-body { flex: 1; overflow-y: auto; padding: 20px 8%; z-index: 1; display: flex; flex-direction: column; }
    
    /* Messages */
    .message { padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; max-width: 65%; font-size: 14.5px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
    .sent { background: var(--sent-msg); align-self: flex-end; }
    .received { background: white; align-self: flex-start; }
    .msg-time { font-size: 10px; color: #667781; margin-left: 10px; margin-top: 5px; float: right; }

    /* Footer */
    .footer { padding: 10px 15px; background: #f0f2f5; display: flex; align-items: center; z-index: 10; }
    .msg-input { border: none; border-radius: 8px; padding: 10px 15px; flex: 1; margin: 0 10px; outline: none; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="nav-rail">
    <div class="nav-item active" onclick="switchTab('chats', this)" title="Chats"><i class="fas fa-comment-dots"></i></div>
    <div class="nav-item" onclick="switchTab('status', this)" title="Status"><i class="fas fa-circle-notch"></i></div>
    <div class="nav-item" onclick="switchTab('communities', this)" title="Communities"><i class="fas fa-users"></i></div>
    <div class="nav-item" onclick="switchTab('calls', this)" title="Calls"><i class="fas fa-phone-alt"></i></div>
    <div class="mt-auto nav-item"><i class="fas fa-cog"></i></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span id="sidebarTitle">Chats</span>
      <i class="fas fa-edit fs-6 text-muted cursor-pointer"></i>
    </div>
    
    <div id="list-container" class="chat-list">
      </div>
  </div>

  <div class="main-view" id="mainView">
    <div class="view-header">
      <img src="https://i.pravatar.cc/150?u=1" id="mainAvatar" class="avatar">
      <div class="ms-3 flex-grow-1">
        <h6 class="mb-0" id="mainTitle">Select a Contact</h6>
        <small class="text-muted" id="mainStatus">online</small>
      </div>
      <div class="d-flex align-items-center">
        <i class="fas fa-video text-muted me-4 cursor-pointer" onclick="makeCall()"></i>
        <i class="fas fa-phone-alt text-muted me-4 cursor-pointer" onclick="makeCall()"></i>
        <i class="fas fa-search text-muted cursor-pointer"></i>
      </div>
    </div>

    <div class="view-body" id="chatBody">
        <div class="text-center my-auto">
            <h5 class="text-muted">Welcome to WhatsApp Pro</h5>
            <p class="text-muted small">Select a chat to start messaging</p>
        </div>
    </div>

    <div class="footer">
      <i class="far fa-smile fs-4 text-muted cursor-pointer"></i>
      <i class="fas fa-plus fs-5 text-muted ms-3 cursor-pointer"></i>
      <input type="text" id="msgInput" class="msg-input" placeholder="Type a message" onkeypress="handleEnter(event)">
      <i class="fas fa-paper-plane fs-4 text-success cursor-pointer" onclick="sendMsg()"></i>
    </div>
  </div>
</div>

<script>
  // Complete Users List (8 People)
  const users = [
    { id: 1, name: "Ali Ahmed", status: "online", img: "https://i.pravatar.cc/150?u=11", lastMsg: "Kahan ho bro?", type: 'chat' },
    { id: 2, name: "Sara Khan", status: "last seen 10:00 AM", img: "https://i.pravatar.cc/150?u=5", lastMsg: "Files bhej di hain.", type: 'chat' },
    { id: 3, name: "Zain Malik", status: "online", img: "https://i.pravatar.cc/150?u=8", lastMsg: "Dinner scene?", type: 'chat' },
    { id: 4, name: "Ayesha Gull", status: "typing...", img: "https://i.pravatar.cc/150?u=9", lastMsg: "Hahaha, sahi kaha!", type: 'chat' },
    { id: 5, name: "Hamza Dev", status: "online", img: "https://i.pravatar.cc/150?u=15", lastMsg: "Code push kar diya hai.", type: 'chat' },
    { id: 6, name: "Usman", status: "last seen yesterday", img: "https://i.pravatar.cc/150?u=22", lastMsg: "Kal milte hain.", type: 'chat' },
    { id: 7, name: "Fatima", status: "online", img: "https://i.pravatar.cc/150?u=25", lastMsg: "Okay!", type: 'chat' },
    { id: 8, name: "Bilal", status: "away", img: "https://i.pravatar.cc/150?u=33", lastMsg: "Voice note check karein.", type: 'chat' }
  ];

  const replies = [
    "Theek hai, main baad mein dekhta hoon.",
    "Zabardast! Phir kab milna hai?",
    "Hahaha, bilkul sahi!",
    "Ji main abhi check karke batata hoon.",
    "Kya aap busy hain?",
    "Okay done!"
  ];

  let activeChatId = null;

  // Initialize Chat List
  function renderList(type) {
    const container = document.getElementById('list-container');
    container.innerHTML = "";

    if(type === 'chats') {
        users.forEach(user => {
            const div = document.createElement('div');
            div.className = `item-row ${activeChatId === user.id ? 'active' : ''}`;
            div.onclick = () => openChat(user.id);
            div.innerHTML = `
                <img src="${user.img}" class="avatar">
                <div class="ms-3 flex-grow-1 overflow-hidden">
                    <div class="d-flex justify-content-between">
                        <h6 class="mb-0 text-truncate">${user.name}</h6>
                        <small class="text-muted" style="font-size:10px">12:45 PM</small>
                    </div>
                    <p class="text-muted small mb-0 text-truncate">${user.lastMsg}</p>
                </div>
            `;
            container.appendChild(div);
        });
    } else if(type === 'status') {
        container.innerHTML = `
            <div class="p-3"><h6>My Status</h6><small class="text-muted">Tap to add status update</small></div>
            <hr class="m-0">
            <div class="p-3 text-muted small">RECENT UPDATES</div>
            ${users.slice(0,4).map(u => `
                <div class="item-row">
                    <img src="${u.img}" class="avatar status-circle">
                    <div class="ms-3"><h6>${u.name}</h6><small class="text-muted">Just now</small></div>
                </div>
            `).join('')}
        `;
    } else if(type === 'calls') {
        container.innerHTML = users.map(u => `
            <div class="item-row">
                <img src="${u.img}" class="avatar">
                <div class="ms-3 flex-grow-1">
                    <h6>${u.name}</h6>
                    <small class="text-muted"><i class="fas fa-arrow-down-left text-success"></i> Today, 2:30 PM</small>
                </div>
                <i class="fas fa-phone-alt text-success mt-2"></i>
            </div>
        `).join('');
    } else {
        container.innerHTML = `<div class="p-5 text-center text-muted">No Communities joined yet.</div>`;
    }
  }

  function switchTab(tab, el) {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('sidebarTitle').innerText = tab.charAt(0).toUpperCase() + tab.slice(1);
    renderList(tab);
  }

  function openChat(id) {
    activeChatId = id;
    const user = users.find(u => u.id === id);
    document.getElementById('mainTitle').innerText = user.name;
    document.getElementById('mainStatus').innerText = user.status;
    document.getElementById('mainAvatar').src = user.img;
    document.getElementById('chatBody').innerHTML = `<div class="text-center my-2 small text-muted"><i class="fas fa-lock" style="font-size:10px"></i> End-to-end encrypted</div>`;
    renderList('chats');
  }

  function sendMsg() {
    const input = document.getElementById('msgInput');
    if(!input.value.trim() || !activeChatId) return;
    
    appendMsg(input.value, 'sent');
    const val = input.value;
    input.value = "";

    // Auto Reply
    setTimeout(() => {
        document.getElementById('mainStatus').innerText = "typing...";
        setTimeout(() => {
            document.getElementById('mainStatus').innerText = "online";
            const reply = replies[Math.floor(Math.random() * replies.length)];
            appendMsg(reply, 'received');
        }, 1500);
    }, 500);
  }

  function appendMsg(text, type) {
    const body = document.getElementById('chatBody');
    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = `${text} <span class="msg-time">${time} ${type==='sent'?'<i class="fas fa-check-double text-info"></i>':''}</span>`;
    body.appendChild(div);
    body.scrollTop = body.scrollHeight;
  }

  function makeCall() {
    alert("Calling " + document.getElementById('mainTitle').innerText + "...");
  }

  function handleEnter(e) { if(e.key === 'Enter') sendMsg(); }

  // Start with chats
  renderList('chats');
</script>

</body>
</html>
