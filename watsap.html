<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro WhatsApp Clone</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --wa-bg: #f0f2f5;
      --wa-green: #00a884;
      --wa-header: #f0f2f5;
      --wa-sidebar-hover: #f5f6f6;
      --sent-msg: #d9fdd3;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #dadbd3;
      height: 100vh;
      overflow: hidden;
    }

    /* Main Container with subtle shadow */
    .chat-container {
      height: 95vh;
      max-width: 1400px;
      margin: 20px auto;
      background: white;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      display: flex;
      border-radius: 4px;
    }

    /* Sidebar Styling */
    .sidebar {
      width: 30%;
      border-right: 1px solid #ddd;
      background: white;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      background: var(--wa-header);
      padding: 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .profile-img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
    }

    .search-box {
      padding: 8px 12px;
      background: #fff;
    }

    .search-inner {
      background: #f0f2f5;
      border-radius: 8px;
      padding: 5px 10px;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
    }

    .chat-item {
      display: flex;
      padding: 12px 16px;
      cursor: pointer;
      transition: 0.2s;
      border-bottom: 1px solid #f2f2f2;
    }

    .chat-item:hover, .chat-item.active {
      background: var(--wa-sidebar-hover);
    }

    .chat-info {
      margin-left: 15px;
      flex: 1;
    }

    .chat-info h6 { margin: 0; font-size: 16px; font-weight: 500; }
    .chat-info p { margin: 0; font-size: 13px; color: #667781; }

    /* Main Chat Area */
    .chat-main {
      width: 70%;
      background: #efeae2;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .chat-main::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
      opacity: 0.06;
      pointer-events: none;
    }

    .chat-main-header {
      padding: 10px 16px;
      background: var(--wa-header);
      display: flex;
      align-items: center;
      z-index: 10;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 7%;
      z-index: 1;
    }

    /* Message Bubbles */
    .message {
      padding: 6px 10px;
      border-radius: 8px;
      margin-bottom: 4px;
      max-width: 65%;
      font-size: 14.5px;
      position: relative;
      box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
    }

    .sent { background: var(--sent-msg); align-self: flex-end; margin-left: auto; }
    .received { background: white; align-self: flex-start; }

    .msg-time {
      font-size: 10px;
      color: #667781;
      margin-left: 10px;
      float: right;
      margin-top: 5px;
    }

    /* Footer */
    .chat-footer {
      padding: 10px 16px;
      background: var(--wa-header);
      display: flex;
      align-items: center;
      z-index: 10;
    }

    .msg-input {
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      flex: 1;
      margin: 0 10px;
      outline: none;
    }

    .btn-icon {
      color: #54656f;
      font-size: 20px;
      cursor: pointer;
      padding: 5px;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="sidebar">
    <div class="sidebar-header">
      <img src="https://i.pravatar.cc/100?img=12" class="profile-img" alt="Me">
      <div>
        <i class="btn-icon fas fa-circle-notch"></i>
        <i class="btn-icon fas fa-comment-alt ms-3"></i>
        <i class="btn-icon fas fa-ellipsis-v ms-3"></i>
      </div>
    </div>

    <div class="search-box">
      <div class="search-inner">
        <i class="fas fa-search text-muted small"></i>
        <input type="text" class="bg-transparent border-0 ms-2 small w-75" placeholder="Search or start new chat">
      </div>
    </div>

    <div class="chat-list" id="chatList">
      </div>
  </div>

  <div class="chat-main">
    <div class="chat-main-header">
      <img src="https://i.pravatar.cc/100?img=1" id="activeAvatar" class="profile-img">
      <div class="ms-3 flex-grow-1">
        <h6 class="mb-0" id="activeName">Select a chat</h6>
        <small class="text-muted" id="activeStatus">online</small>
      </div>
      <div>
        <i class="btn-icon fas fa-search"></i>
        <i class="btn-icon fas fa-ellipsis-v ms-3"></i>
      </div>
    </div>

    <div class="chat-body d-flex flex-column" id="chatBody">
      <div class="text-center mt-5 text-muted">
        <i class="fas fa-lock small"></i> End-to-end encrypted
      </div>
    </div>

    <div class="chat-footer">
      <i class="btn-icon far fa-smile"></i>
      <i class="btn-icon fas fa-paperclip ms-2"></i>
      <input type="text" id="messageInput" class="msg-input" placeholder="Type a message" onkeypress="checkEnter(event)">
      <button class="border-0 bg-transparent" onclick="sendMessage()">
        <i class="btn-icon fas fa-paper-plane text-success"></i>
      </button>
    </div>
  </div>
</div>

<script>
  // Chat Data for Functionality
  const chats = [
    { id: 1, name: "Ali Ahmed", status: "online", img: "https://i.pravatar.cc/100?img=11", lastMsg: "See you tomorrow!" },
    { id: 2, name: "Sara Khan", status: "last seen today at 12:45", img: "https://i.pravatar.cc/100?img=5", lastMsg: "The project is ready." },
    { id: 3, name: "Office Group", status: "click for info", img: "https://i.pravatar.cc/100?img=3", lastMsg: "Meeting at 4 PM" }
  ];

  let activeChatId = null;

  // Load Chat List
  function loadChatList() {
    const list = document.getElementById('chatList');
    list.innerHTML = chats.map(chat => `
      <div class="chat-item" onclick="selectChat(${chat.id})">
        <img src="${chat.img}" class="profile-img">
        <div class="chat-info">
          <h6>${chat.name}</h6>
          <p>${chat.lastMsg}</p>
        </div>
      </div>
    `).join('');
  }

  // Switch Chat
  function selectChat(id) {
    const chat = chats.find(c => c.id === id);
    activeChatId = id;
    document.getElementById('activeName').innerText = chat.name;
    document.getElementById('activeStatus').innerText = chat.status;
    document.getElementById('activeAvatar').src = chat.img;
    document.getElementById('chatBody').innerHTML = ''; // Clear for new chat
  }

  // Send Message
  function sendMessage() {
    if(!activeChatId) return alert("Please select a chat first!");
    
    let input = document.getElementById("messageInput");
    let message = input.value.trim();
    if(message === "") return;

    let chatBody = document.getElementById("chatBody");
    let time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    let msgDiv = document.createElement("div");
    msgDiv.className = "message sent";
    msgDiv.innerHTML = `${message} <span class="msg-time">${time} <i class="fas fa-check-double" style="color:#53bdeb"></i></span>`;

    chatBody.appendChild(msgDiv);
    input.value = "";
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  function checkEnter(e) {
    if(e.key === 'Enter') sendMessage();
  }

  // Initialize
  loadChatList();
</script>

</body>
</html>
