<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DealDocs AI</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #0f172a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
}

.hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
}

.highlight {
    color: #3B82F6;
    font-weight: 600;
}

.hero h1 {
    font-size: 3rem;
    font-weight: 700;
}

.hero p {
    font-size: 1.2rem;
    color: #cbd5e1;
}

.btn-custom {
    background: #3B82F6;
    color: #fff;
    border-radius: 30px;
    padding: 12px 28px;
    border: none;
    transition: 0.3s;
}

.btn-custom:hover {
    background: #2563eb;
    transform: translateY(-2px);
}

/* animation */
.fade-in {
    opacity: 0;
    transform: translateY(30px);
    transition: 0.8s ease;
}

.fade-in.show {
    opacity: 1;
    transform: translateY(0);
}
</style>
</head>

<body>

<section class="hero text-center">
    <div class="container">

        <h1 class="fade-in">
            What lending teams gain with 
            <span class="highlight">DealDocs.AI</span>
        </h1>

        <p class="mt-4 fade-in">
            Lead with <span class="highlight">operational pain</span>, 
            reinforce <span class="highlight">proof early</span>, 
            then move into capabilities and trust.
        </p>

        <button class="btn btn-custom mt-4 fade-in">
            Get Started
        </button>

    </div>
</section>

<!-- JS -->
<script>
const elements = document.querySelectorAll('.fade-in');

window.addEventListener('scroll', () => {
    elements.forEach(el => {
        const position = el.getBoundingClientRect().top;
        const screenHeight = window.innerHeight;

        if (position < screenHeight - 100) {
            el.classList.add('show');
        }
    });
});

// trigger on load
window.dispatchEvent(new Event('scroll'));
</script>

</body>
</html>
