<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Clone Improved</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background-color: #0f0f0f;
      color: white;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .navbar {
      background-color: #0f0f0f;
      border-bottom: 1px solid #222;
    }

    .sidebar {
      height: 100vh;
      position: fixed;
      top: 56px;
      left: 0;
      width: 220px;
      background: #0f0f0f;
      padding-top: 10px;
      border-right: 1px solid #222;
      overflow-y: auto;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin: 4px 10px;
    }

    .sidebar a:hover {
      background: #272727;
    }

    .content {
      margin-left: 220px;
      margin-top: 80px;
      padding: 20px;
    }

    .video-card {
      background: #181818;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s ease;
    }

    .video-card:hover {
      transform: translateY(-5px);
    }

    .video-thumb {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .video-info {
      padding: 10px;
    }

    .video-info h6 {
      font-size: 14px;
      margin-bottom: 5px;
    }

    .video-info small {
      color: #aaa;
    }

    .search-box {
      width: 100%;
      max-width: 500px;
    }

    /* Responsive Fix */
    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
      }

      .sidebar a span {
        display: none;
      }

      .content {
        margin-left: 70px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top px-3 d-flex justify-content-between">
    <div class="d-flex align-items-center">
      <i class="fa fa-bars me-3"></i>
      <h5 class="m-0">YouTube</h5>
    </div>

    <div class="d-flex flex-grow-1 justify-content-center px-3">
      <input type="text" class="form-control search-box" placeholder="Search">
      <button class="btn btn-outline-light"><i class="fa fa-search"></i></button>
    </div>

    <div>
      <i class="fa fa-video me-3"></i>
      <i class="fa fa-bell"></i>
    </div>
  </nav>

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#"><i class="fa fa-home"></i><span>Home</span></a>
    <a href="#"><i class="fa fa-fire"></i><span>Trending</span></a>
    <a href="#"><i class="fa fa-play"></i><span>Subscriptions</span></a>
    <a href="#"><i class="fa fa-folder"></i><span>Library</span></a>
  </div>

  <!-- Content -->
  <div class="container-fluid content">
    <div class="row g-4" id="videoContainer"></div>
  </div>

  <script>
    const videos = Array.from({ length: 12 }, (_, i) => ({
      title: "Awesome Video " + (i + 1),
      channel: "Channel " + (i + 1),
      thumbnail: `https://picsum.photos/400/200?random=${i}`
    }));

    const container = document.getElementById('videoContainer');

    function loadVideos() {
      container.innerHTML = "";
      videos.forEach(video => {
        const col = document.createElement('div');
        col.className = 'col-xl-3 col-lg-4 col-md-6 col-sm-12';

        col.innerHTML = `
          <div class="video-card">
            <img src="${video.thumbnail}" class="video-thumb">
            <div class="video-info">
              <h6>${video.title}</h6>
              <small>${video.channel}</small>
            </div>
          </div>
        `;

        container.appendChild(col);
      });
    }

    loadVideos();
  </script>

</body>
</html>
