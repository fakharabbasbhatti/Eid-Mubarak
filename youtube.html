<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Pro - Playable & Functional</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --bg-black: #0f0f0f;
      --nav-bg: #0f0f0f;
      --card-hover: #272727;
      --text-main: #f1f1f1;
      --text-dim: #aaaaaa;
    }

    body {
      background-color: var(--bg-black);
      color: var(--text-main);
      font-family: "Roboto", sans-serif;
      overflow-x: hidden;
    }

    /* Navbar & Search */
    .navbar { background: var(--nav-bg); padding: 0.5rem 1rem; z-index: 1050; border-bottom: 1px solid #222; }
    .yt-logo { font-size: 1.2rem; font-weight: bold; color: white; text-decoration: none; display: flex; align-items: center; }
    .yt-logo i { color: red; font-size: 1.8rem; margin-right: 4px; }

    .search-wrapper {
      display: flex;
      align-items: center;
      background: #121212;
      border: 1px solid #333;
      border-radius: 40px;
      padding: 2px 2px 2px 20px;
      width: 100%;
      max-width: 500px;
    }
    .search-wrapper input { background: transparent; border: none; color: white; width: 100%; outline: none; }
    .search-btn { background: #222; border: none; color: white; padding: 7px 20px; border-radius: 0 40px 40px 0; border-left: 1px solid #333; }

    /* Sidebar */
    .sidebar { width: 240px; height: 100vh; position: fixed; top: 56px; left: 0; background: var(--bg-black); transition: 0.3s; overflow: hidden; z-index: 1000; }
    .sidebar.mini { width: 72px; }
    .sidebar a { display: flex; align-items: center; padding: 12px 24px; color: white; text-decoration: none; transition: 0.2s; white-space: nowrap; }
    .sidebar a:hover, .sidebar a.active { background: var(--card-hover); border-radius: 10px; margin: 0 8px; }
    .sidebar i { font-size: 1.3rem; min-width: 40px; }

    /* Filter Chips */
    .filter-container { position: sticky; top: 56px; background: var(--bg-black); z-index: 999; padding: 10px 0; display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; }
    .filter-chip { background: #272727; color: white; padding: 6px 15px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; white-space: nowrap; border: none; }
    .filter-chip.active { background: white; color: black; }

    /* Content Area */
    .main-content { margin-left: 240px; transition: 0.3s; padding: 20px; margin-top: 50px; }
    .main-content.expanded { margin-left: 72px; }

    .video-card { cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
    .video-card:hover { transform: scale(1.02); }
    .thumb-img { width: 100%; aspect-ratio: 16/9; border-radius: 12px; object-fit: cover; }
    .video-title { font-size: 1rem; font-weight: 500; margin-top: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .video-meta { color: var(--text-dim); font-size: 0.85rem; }

    /* VIDEO MODAL (POPUP) */
    .video-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center;
    }
    .modal-content-custom { width: 90%; max-width: 900px; position: relative; }
    .close-modal { position: absolute; top: -45px; right: 0; color: white; font-size: 2.5rem; cursor: pointer; }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

    @media (max-width: 768px) {
      .sidebar { left: -240px; }
      .sidebar.show-mobile { left: 0; width: 240px; }
      .main-content { margin-left: 0 !important; }
    }
  </style>
</head>
<body>

  <!-- Nav -->
  <nav class="navbar fixed-top d-flex justify-content-between">
    <div class="d-flex align-items-center">
      <button class="btn text-white me-3" id="menuBtn"><i class="fa fa-bars"></i></button>
      <a href="#" class="yt-logo"><i class="fab fa-youtube"></i> YouTube</a>
    </div>
    
    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="Search videos...">
      <button class="search-btn"><i class="fa fa-search"></i></button>
    </div>

    <div class="d-flex align-items-center gap-3 text-white fs-5">
      <i class="fa fa-video d-none d-md-block"></i>
      <i class="fa fa-bell"></i>
      <div style="width:32px; height:32px; background:linear-gradient(45deg, #f06, #f90); border-radius:50%"></div>
    </div>
  </nav>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <a href="#" class="active"><i class="fa fa-home"></i> <span>Home</span></a>
    <a href="#"><i class="fa-regular fa-compass"></i> <span>Explore</span></a>
    <a href="#"><i class="fa-solid fa-bolt"></i> <span>Shorts</span></a>
    <a href="#"><i class="fa-solid fa-layer-group"></i> <span>Subscriptions</span></a>
    <hr style="border-color: #333;">
    <a href="#"><i class="fa-solid fa-box-archive"></i> <span>Library</span></a>
    <a href="#"><i class="fa-solid fa-history"></i> <span>History</span></a>
  </div>

  <!-- Main Content -->
  <div class="main-content" id="mainContent">
    <div class="filter-container" id="filters">
      <button class="filter-chip active">All</button>
      <button class="filter-chip">Music</button>
      <button class="filter-chip">Gaming</button>
      <button class="filter-chip">Programming</button>
      <button class="filter-chip">Nature</button>
    </div>

    <div class="row g-4 mt-2" id="videoGrid">
      <!-- Videos will load here -->
    </div>
  </div>

  <!-- Video Player Modal -->
  <div class="video-modal" id="videoModal">
    <div class="modal-content-custom">
      <span class="close-modal" id="closeBtn">&times;</span>
      <div class="video-container">
        <iframe id="videoFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
      <h4 id="modalTitle" class="mt-3 text-white"></h4>
    </div>
  </div>

  <script>
    // 1. Updated Data with real YouTube IDs
    const videoData = [
      { id: "hPr-Yc92qaY", title: "Learn JavaScript in 2026 - Full Course", channel: "Code Master", category: "Programming", views: "1.2M", time: "2 days ago", thumb: "https://img.youtube.com/vi/hPr-Yc92qaY/maxresdefault.jpg" },
      { id: "5qap5aO4i9A", title: "Lofi Hip Hop Radio - Beats to Relax/Study", channel: "Chill Vibes", category: "Music", views: "800K", time: "5 hours ago", thumb: "https://img.youtube.com/vi/5qap5aO4i9A/maxresdefault.jpg" },
      { id: "ScMzIvxBSi4", title: "Amazing Gaming Setup & Highlights", channel: "Gamer Zone", category: "Gaming", views: "500K", time: "1 day ago", thumb: "https://img.youtube.com/vi/ScMzIvxBSi4/maxresdefault.jpg" },
      { id: "668nre7fi7w", title: "4K Nature Relaxation - Birds & Flowers", channel: "Nature Hub", category: "Nature", views: "2M", time: "1 week ago", thumb: "https://img.youtube.com/vi/668nre7fi7w/maxresdefault.jpg" },
      { id: "libKVRa01L8", title: "Space Exploration: Journey to Mars", channel: "Science Daily", category: "All", views: "3.4M", time: "3 days ago", thumb: "https://img.youtube.com/vi/libKVRa01L8/maxresdefault.jpg" },
      { id: "T63MC_0_K8E", title: "Web Development Roadmap 2026", channel: "Tech World", category: "Programming", views: "150K", time: "10 hours ago", thumb: "https://img.youtube.com/vi/T63MC_0_K8E/maxresdefault.jpg" },
    ];

    const videoGrid = document.getElementById('videoGrid');
    const searchInput = document.getElementById('searchInput');
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    const videoModal = document.getElementById('videoModal');
    const videoFrame = document.getElementById('videoFrame');
    const modalTitle = document.getElementById('modalTitle');
    const closeBtn = document.getElementById('closeBtn');

    // 2. Render Function (Added onclick)
    function renderVideos(list) {
      videoGrid.innerHTML = list.map(v => `
        <div class="col-xl-3 col-lg-4 col-md-6">
          <div class="video-card" onclick="openPlayer('${v.id}', '${v.title}')">
            <img src="${v.thumb}" class="thumb-img">
            <div class="d-flex gap-2 mt-2">
              <div style="width:36px; height:36px; border-radius:50%; background:#444; flex-shrink:0"></div>
              <div class="video-info">
                <div class="video-title">${v.title}</div>
                <div class="video-meta">${v.channel}</div>
                <div class="video-meta">${v.views} • ${v.time}</div>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 3. Video Player Logic
    function openPlayer(id, title) {
      videoFrame.src = `https://www.youtube.com/embed/${id}?autoplay=1`;
      modalTitle.innerText = title;
      videoModal.style.display = 'flex';
      document.body.style.overflow = 'hidden'; // Disable scroll when playing
    }

    closeBtn.onclick = () => {
      videoModal.style.display = 'none';
      videoFrame.src = ""; // Stop video
      document.body.style.overflow = 'auto'; // Enable scroll
    };

    // Close on clicking outside the video
    window.onclick = (event) => {
      if (event.target == videoModal) {
        closeBtn.onclick();
      }
    };

    // 4. Search Functionality
    searchInput.addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      const filtered = videoData.filter(v => v.title.toLowerCase().includes(term));
      renderVideos(filtered);
    });

    // 5. Sidebar Toggle
    menuBtn.addEventListener('click', () => {
      if(window.innerWidth > 768) {
        sidebar.classList.toggle('mini');
        mainContent.classList.toggle('expanded');
      } else {
        sidebar.classList.toggle('show-mobile');
      }
    });

    // 6. Category Filter
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelector('.filter-chip.active').classList.remove('active');
        chip.classList.add('active');
        const cat = chip.innerText;
        const filtered = cat === 'All' ? videoData : videoData.filter(v => v.category === cat);
        renderVideos(filtered);
      });
    });

    renderVideos(videoData);
  </script>
</body>
</html>
