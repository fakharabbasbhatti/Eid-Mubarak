<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Inquiry Card</title>
<style>
    :root {
        --primary-color: #2563eb;
        --text-main: #1f2937;
        --text-muted: #4b5563;
        --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg-gradient);
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .card {
        background: #ffffff;
        padding: 40px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        border: 1px solid #f1f5f9;
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    h2 {
        margin: 0 0 16px 0;
        color: var(--text-main);
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.025em;
    }

    p {
        color: var(--text-muted);
        line-height: 1.6;
        font-size: 1rem;
        margin-bottom: 20px;
    }

    .signature {
        border-top: 1px solid #f1f5f9;
        padding-top: 20px;
        margin-top: 20px;
    }

    .btn {
        display: inline-block;
        width: 100%;
        padding: 12px 24px;
        border: none;
        border-radius: 6px;
        background: var(--primary-color);
        color: white;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: center;
    }

    .btn:hover {
        background: #1d4ed8;
        transform: translateY(-1px);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .btn:active {
        transform: translateY(0);
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="card">
    <h2>Project Inquiry</h2>
    <p>
        Hello Fizza, <br><br>
        I recently reviewed your services and believe your expertise aligns well with my current project requirements. I would appreciate it if you could review the attached brief and provide a proposal at your earliest convenience.
    </p>
    
    <div class="signature">
        <p>Best regards,<br><strong>Fakhar</strong></p>
    </div>

    <button class="btn" onclick="showMessage()">Acknowledge Receipt</button>
</div>

<script>
    function showMessage() {
        // Professional feedback message
        alert("Thank you, Fakhar. Your inquiry has been acknowledged. I will review the details and get back to you shortly.");
    }
</script>

</body>
</html>
