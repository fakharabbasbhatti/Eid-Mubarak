<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Card</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        font-family: Arial, sans-serif;
    }

    .card {
        background: #fff;
        padding: 25px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        animation: fadeIn 1s ease;
    }

    h2 {
        margin-top: 0;
        color: #333;
    }

    p {
        color: #555;
        line-height: 1.5;
    }

    .btn {
        margin-top: 15px;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        background: #667eea;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        background: #5a67d8;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);} 
        to {opacity: 1; transform: translateY(0);} 
    }
</style>
</head>
<body>

<div class="card">
    <h2>Hello Fizza 👋</h2>
    <p>
        I found your Service Page and I am interested in working together.
        Please review my project request and submit a proposal if it’s a good fit for you.
    </p>
    <p><strong>Looking forward to learning more about your work.</strong></p>
    <p>Thanks,<br>Fakhar</p>

    <button class="btn" onclick="showMessage()">Reply</button>
</div>

<script>
    function showMessage() {
        alert("Thanks Fakhar! I will review your project and get back to you soon.");
    }
</script>

</body>
</html>
