<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Floral Card</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

:root {
    --primary: #ec4899;
    --secondary: #f472b6;
    --bg-dark: #0b0f1a;
    --text: #f3f4f6;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: var(--bg-dark);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
}

/* 🌸 Floating flowers */
body::before, body::after {
    content: "🌸 🌼 🌷 🌺";
    position: absolute;
    font-size: 40px;
    opacity: 0.08;
    animation: float 25s linear infinite;
}

body::after {
    top: 60%;
    left: 70%;
    animation-delay: 10s;
}

@keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); }
    100% { transform: translateY(-100vh) rotate(360deg); }
}

/* Card */
.card {
    position: relative;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border-radius: 25px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 20px 60px rgba(236, 72, 153, 0.2);
}

/* Floral glow border */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 25px;
    padding: 1px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}

/* Heading */
h2 {
    margin: 0;
    font-size: 1.8rem;
    background: linear-gradient(to right, #fff, #f9a8d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Badge */
.status-badge {
    display: inline-block;
    padding: 5px 14px;
    background: rgba(236, 72, 153, 0.1);
    border: 1px solid rgba(236, 72, 153, 0.3);
    color: #f9a8d4;
    border-radius: 20px;
    margin-bottom: 20px;
    font-size: 0.75rem;
}

/* Text */
p {
    color: #d1d5db;
    line-height: 1.6;
    margin-top: 15px;
}

/* Footer */
.signature-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
}

/* Button */
.btn {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    padding: 12px 28px;
    border-radius: 12px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 15px 30px rgba(236, 72, 153, 0.4);
}

/* Name */
.name-tag {
    color: #fff;
    font-weight: 600;
}
</style>
</head>

<body>

<div class="card">
    <div class="status-badge">🌸 New Collaboration</div>
    <h2>Project Inquiry</h2>

    <p>
        Hi Fizza, <br><br>
        I’ve explored your portfolio and I'm impressed with your work. 
        I have a project that requires your specific skillset and would 
        love to discuss a potential collaboration.
    </p>

    <div class="signature-area">
        <div class="name-tag">
            <small style="color:#9ca3af;">From</small><br>
            Fakhar
        </div>
        <button class="btn" onclick="handleReply()">View Brief</button>
    </div>
</div>

<script>
function handleReply() {
    const btn = document.querySelector('.btn');
    btn.innerHTML = "Opening...";
    setTimeout(() => {
        alert("Redirecting to project documentation...");
        btn.innerHTML = "View Brief";
    }, 800);
}
</script>

</body>
</html>
