<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Floral Card</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

:root {
    --pink: #ec4899;
    --soft-pink: #f9a8d4;
    --purple: #a855f7;
    --bg: #0b0f1a;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    overflow: hidden;
}

/* 🌸 Blurred floral background blobs */
.bg-flower {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: move 20s infinite alternate ease-in-out;
}

.bg1 {
    width: 300px;
    height: 300px;
    background: #ec4899;
    top: 10%;
    left: 10%;
}

.bg2 {
    width: 250px;
    height: 250px;
    background: #a855f7;
    bottom: 10%;
    right: 10%;
}

@keyframes move {
    0% { transform: translate(0,0); }
    100% { transform: translate(50px, -50px); }
}

/* 🌷 Card */
.card {
    position: relative;
    width: 420px;
    padding: 40px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(25px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 30px 80px rgba(236,72,153,0.25);
    overflow: hidden;
}

/* 🌸 Animated gradient border */
.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 25px;
    background: linear-gradient(270deg, #ec4899, #a855f7, #f9a8d4);
    background-size: 600% 600%;
    animation: borderGlow 8s ease infinite;
    z-index: -1;
}

@keyframes borderGlow {
    0% { background-position: 0% }
    50% { background-position: 100% }
    100% { background-position: 0% }
}

/* 🌷 Corner flowers */
.card::after {
    content: "🌸";
    position: absolute;
    font-size: 60px;
    bottom: -10px;
    right: -10px;
    opacity: 0.2;
}

/* Heading */
h2 {
    font-size: 1.8rem;
    margin: 0;
    background: linear-gradient(to right, #fff, #f9a8d4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* Badge */
.status-badge {
    display: inline-block;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(236,72,153,0.15);
    border: 1px solid rgba(236,72,153,0.3);
    color: var(--soft-pink);
    margin-bottom: 20px;
    font-size: 0.75rem;
}

/* Text */
p {
    color: #d1d5db;
    line-height: 1.7;
}

/* Footer */
.signature-area {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
}

/* 💫 Button shine effect */
.btn {
    position: relative;
    padding: 12px 28px;
    border-radius: 12px;
    border: none;
    color: white;
    font-weight: 600;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    cursor: pointer;
    overflow: hidden;
}

.btn::before {
    content: "";
    position: absolute;
    width: 120%;
    height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    top: 0;
    left: -120%;
    transition: 0.5s;
}

.btn:hover::before {
    left: 120%;
}

.btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 15px 40px rgba(236,72,153,0.5);
}

/* Name */
.name-tag {
    color: white;
    font-weight: 600;
}

</style>
</head>

<body>

<div class="bg-flower bg1"></div>
<div class="bg-flower bg2"></div>

<div class="card">
    <div class="status-badge">🌸 New Collaboration</div>
    <h2>Project Inquiry</h2>

    <p>
        Hi Fizza,<br><br>
        I’ve explored your portfolio and I'm impressed with your work.
        I have a project that requires your specific skillset and would love to discuss a potential collaboration.
    </p>

    <div class="signature-area">
        <div class="name-tag">
            <small style="color:#9ca3af;">From</small><br>
            Fakhar
        </div>
        <button class="btn" onclick="handleReply()">View Brief</button>
    </div>
</div>

<script>
function handleReply() {
    const btn = document.querySelector('.btn');
    btn.innerHTML = "Opening...";
    setTimeout(() => {
        alert("Redirecting...");
        btn.innerHTML = "View Brief";
    }, 800);
}
</script>

</body>
</html>
