<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE.OS | Futuristic Portfolio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.3);
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            height: 100vh;
        }

        /* Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 9999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* Animated Grid */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            mask-image: radial-gradient(circle at center, black, transparent 90%);
            opacity: 0.4;
        }

        .navbar {
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.5);
        }

        .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            color: var(--accent) !important;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Hero Text Styles */
        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            letter-spacing: -2px;
        }

        .text-gradient {
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glass Panel UI */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .glass-panel:hover {
            border-color: var(--accent);
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        /* Neon Buttons */
        .btn-neon {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 12px 35px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
        }

        .btn-neon:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 25px var(--accent);
        }

        /* Metric Highlights */
        .metric-card {
            border-right: 1px solid var(--glass-border);
            padding: 15px;
        }

        .metric-value {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            font-size: 1.5rem;
            display: block;
        }

        /* Glitch Animation */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .glitch-hover:hover {
            animation: glitch 0.3s linear infinite;
        }

    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a class="navbar-brand" href="#">CORE<span style="font-weight:300">.OS</span></a>
            <div class="ms-auto d-flex align-items-center">
                <span class="text-secondary small d-none d-md-block me-4 uppercase-spaced"><i class="fas fa-circle text-success me-2 small"></i>SYSTEM ONLINE</span>
                <button class="btn-neon">Console</button>
            </div>
        </div>
    </nav>

    <section class="hero-section container">
        <div class="row align-items-center w-100 g-5">
            <div class="col-lg-7">
                <div class="badge border border-info text-info px-3 py-2 mb-4 rounded-0">v4.0.2 SECURE_CONNECTION</div>
                <h1 class="mb-4">ENGINEERING <br><span class="text-gradient">VOXELS & CODE</span></h1>
                <p class="lead text-secondary mb-5 pe-lg-5">Developer specializing in high-frequency data visualization and immersive browser-based architecture.</p>
                <div class="d-flex gap-3">
                    <button class="btn-neon glitch-hover">View Database</button>
                    <button class="btn btn-outline-light px-4 py-2 border-secondary rounded-0 small opacity-75">Documentation</button>
                </div>
            </div>
            
            <div class="col-lg-5">
                <div class="glass-panel" id="main-panel">
                    <div class="d-flex justify-content-between mb-4">
                        <small class="text-secondary">UPLINK_STATUS</small>
                        <i class="fas fa-signal text-accent"></i>
                    </div>
                    <canvas id="heroChart"></canvas>
                    <div class="row mt-4 pt-3 border-top border-secondary border-opacity-25">
                        <div class="col-6">
                            <small class="text-secondary d-block">LATENCY</small>
                            <span class="text-white">14ms</span>
                        </div>
                        <div class="col-6">
                            <small class="text-secondary d-block">INTEGRITY</small>
                            <span class="text-accent">99.8%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-5">
        <div class="container">
            <div class="glass-panel">
                <div class="row text-center">
                    <div class="col-6 col-md-3 metric-card">
                        <small class="text-secondary uppercase">Commits</small>
                        <span class="metric-value">4.2k</span>
                    </div>
                    <div class="col-6 col-md-3 metric-card">
                        <small class="text-secondary uppercase">Nodes</small>
                        <span class="metric-value">84</span>
                    </div>
                    <div class="col-6 col-md-3 metric-card">
                        <small class="text-secondary uppercase">Uptime</small>
                        <span class="metric-value">100%</span>
                    </div>
                    <div class="col-6 col-md-3 border-0">
                        <small class="text-secondary uppercase">Level</small>
                        <span class="metric-value">Lvl 24</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 text-center">
        <div class="container">
            <div class="social-links mb-4">
                <a href="#" class="text-secondary mx-3 hover-white"><i class="fab fa-github fa-lg"></i></a>
                <a href="#" class="text-secondary mx-3 hover-white"><i class="fab fa-linkedin fa-lg"></i></a>
                <a href="#" class="text-secondary mx-3 hover-white"><i class="fab fa-discord fa-lg"></i></a>
            </div>
            <p class="small text-secondary" style="letter-spacing: 2px;">&copy; 2026 TERMINAL ACCESS GRANTED</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Hero Chart Logic
        const ctx = document.getElementById('heroChart').getContext('2d');
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(0, 255, 204, 0.4)');
        gradient.addColorStop(1, 'rgba(0, 255, 204, 0)');

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['01', '02', '03', '04', '05', '06'],
                datasets: [{
                    data: [20, 45, 28, 80, 40, 90],
                    borderColor: '#00ffcc',
                    borderWidth: 2,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { display: false }
                }
            }
        });

        // Mouse Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            document.getElementById('main-panel').style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
