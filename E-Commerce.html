<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Store Ultra | V3.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #7efaff;
            --primary-bg: #050505;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        /* --- Navbar Upgrade --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            position: fixed;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -1px; }
        .logo span { color: #a855f7; }

        /* --- Filter Tabs --- */
        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 120px;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            padding: 8px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--gradient);
            border-color: transparent;
        }

        /* --- Product Cards Upgrade --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding-bottom: 100px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 15px;
            border: 1px solid #222;
            transition: all 0.4s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #444;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 18px;
            background: #1a1a1a;
        }

        .card-info { padding: 15px 5px; }
        .card-info h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .card-info .brand { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; }
        
        .rating { color: #ffb800; font-size: 0.9rem; margin: 5px 0; }

        .price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .price-tag { font-size: 1.4rem; font-weight: 700; }

        .add-btn {
            background: white;
            color: black;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .add-btn:hover { background: var(--accent); transform: rotate(90deg); }

        /* --- Notification Toast --- */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--gradient);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 500;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* --- Sidebar Cart --- */
        .cart-overlay {
            position: fixed;
            right: -100%;
            top: 0;
            width: 380px;
            height: 100%;
            background: #0f0f0f;
            z-index: 1001;
            padding: 40px 20px;
            transition: 0.4s ease;
            border-left: 1px solid #222;
        }

        .cart-overlay.open { right: 0; }

        .empty-msg { text-align: center; color: var(--text-dim); margin-top: 50px; }
    </style>
</head>
<body>

<nav>
    <div class="logo">MOBILE<span>ULTRA</span></div>
    <div style="cursor: pointer;" onclick="toggleCart()">
        🛒 Cart (<span id="cart-count">0</span>)
    </div>
</nav>

<div class="container">
    <div class="filters">
        <button class="filter-btn active" onclick="filterItems('all')">All</button>
        <button class="filter-btn" onclick="filterItems('Apple')">Apple</button>
        <button class="filter-btn" onclick="filterItems('Samsung')">Samsung</button>
        <button class="filter-btn" onclick="filterItems('Google')">Google</button>
    </div>

    <div class="products-grid" id="products-grid">
        </div>
</div>

<div id="toast">Added to Cart! 🚀</div>

<div class="cart-overlay" id="cart-sidebar">
    <h2 style="margin-bottom: 20px;">Your Bag</h2>
    <div id="cart-list"></div>
    <div style="margin-top: 30px; border-top: 1px solid #333; padding-top: 20px;">
        <h3>Total: $<span id="cart-total">0</span></h3>
        <button class="filter-btn" style="width: 100%; margin-top: 20px; padding: 15px;" onclick="alert('Ready to Checkout?')">Buy Now</button>
    </div>
    <button onclick="toggleCart()" style="margin-top: 20px; background: none; border: none; color: gray; cursor: pointer;">Close</button>
</div>

<script>
    const products = [
        { id: 1, name: "iPhone 15 Pro", brand: "Apple", price: 999, img: "https://images.unsplash.com/photo-1696446701796-da61225697cc", rating: 5 },
        { id: 2, name: "Galaxy S24 Ultra", brand: "Samsung", price: 1199, img: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf", rating: 4 },
        { id: 3, name: "Pixel 8 Pro", brand: "Google", price: 899, img: "https://images.unsplash.com/photo-1598327105666-5b89351aff97", rating: 5 },
        { id: 4, name: "iPhone 14", brand: "Apple", price: 799, img: "https://images.unsplash.com/photo-1592750475338-74b7b21085ab", rating: 4 },
        { id: 5, name: "Galaxy Z Flip", brand: "Samsung", price: 950, img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9", rating: 5 }
    ];

    let cart = JSON.parse(localStorage.getItem('myCart')) || [];

    function renderProducts(filter = 'all') {
        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';

        const filtered = filter === 'all' ? products : products.filter(p => p.brand === filter);

        filtered.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="card-info">
                        <span class="brand">${p.brand}</span>
                        <h3>${p.name}</h3>
                        <div class="rating">⭐⭐⭐⭐⭐</div>
                        <div class="price-row">
                            <span class="price-tag">$${p.price}</span>
                            <button class="add-btn" onclick="addToCart(${p.id})">+</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        cart.push(product);
        saveCart();
        showToast();
    }

    function showToast() {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function saveCart() {
        localStorage.setItem('myCart', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        const list = document.getElementById('cart-list');
        const totalDisp = document.getElementById('cart-total');
        
        list.innerHTML = cart.length === 0 ? '<p class="empty-msg">Your cart is empty</p>' : '';
        
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price;
            list.innerHTML += `
                <div style="display:flex; justify-content:space-between; margin-bottom:15px; background:#1a1a1a; padding:10px; border-radius:10px;">
                    <span>${item.name}</span>
                    <span>$${item.price} <button onclick="removeItem(${index})" style="background:none; border:none; color:red; cursor:pointer; margin-left:10px;">✕</button></span>
                </div>
            `;
        });
        totalDisp.innerText = total;
    }

    function removeItem(index) {
        cart.splice(index, 1);
        saveCart();
    }

    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('open');
    }

    function filterItems(brand) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderProducts(brand);
    }

    // Initial Load
    renderProducts();
    updateCartUI();

</script>

</body>
</html>
