<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Store</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.product{
background:white;
padding:20px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:10px;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
margin-top:10px;
}

button:hover{
background:#218838;
}

.cart-box{
position:fixed;
right:20px;
bottom:20px;
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
width:260px;
}

.cart-item{
font-size:14px;
margin:5px 0;
}

.video{
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<header>
<h1>Online Mobile Store</h1>
<div>🛒 Cart: <span id="cart-count">0</span></div>
</header>

<!-- Mobile Video -->
<div class="video">
<h2>Latest Smartphone Review</h2>

<iframe width="560" height="315"
src="https://www.youtube.com/embed/RH8Kkz8Q8bA"
title="Mobile Review"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<section class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab">
<h3>iPhone 14</h3>
<p>$900</p>
<button onclick="addToCart('iPhone 14',900)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Samsung Galaxy</h3>
<p>$750</p>
<button onclick="addToCart('Samsung Galaxy',750)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Xiaomi Phone</h3>
<p>$500</p>
<button onclick="addToCart('Xiaomi Phone',500)">Add to Cart</button>
</div>

</section>

<div class="cart-box">
<h3>Your Cart</h3>
<div id="cart-items"></div>
<p><b>Total: $<span id="total">0</span></b></p>
</div>

<script>

let cartCount = 0;
let total = 0;

function addToCart(name,price){

cartCount++;
total += price;

document.getElementById("cart-count").innerText = cartCount;
document.getElementById("total").innerText = total;

let item = document.createElement("div");
item.classList.add("cart-item");
item.innerText = name + " - $" + price;

document.getElementById("cart-items").appendChild(item);

}

</script>

</body>
</html>
