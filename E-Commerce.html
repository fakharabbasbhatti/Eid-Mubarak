<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Store Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(120deg,#1e3c72,#2a5298);
color:#fff;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

header h1{
font-size:28px;
letter-spacing:1px;
}

.video{
text-align:center;
padding:40px;
}

.video iframe{
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

.product{
background:rgba(255,255,255,0.1);
border-radius:20px;
padding:20px;
text-align:center;
backdrop-filter:blur(15px);
transition:0.4s;
position:relative;
overflow:hidden;
}

.product:hover{
transform:translateY(-12px) scale(1.03);
box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

.product img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
margin-bottom:10px;
}

.product h3{
margin:10px 0;
}

.product p{
font-size:20px;
margin-bottom:10px;
}

button{
background:linear-gradient(45deg,#00c6ff,#0072ff);
border:none;
padding:12px 25px;
border-radius:30px;
color:white;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

.cart-box{
position:fixed;
right:20px;
bottom:20px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
width:260px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.cart-item{
font-size:14px;
margin:5px 0;
border-bottom:1px solid rgba(255,255,255,0.2);
padding-bottom:4px;
}

.total{
margin-top:10px;
font-weight:bold;
font-size:18px;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
padding:5px 10px;
border-radius:10px;
font-size:12px;
}

</style>
</head>

<body>

<header>
<h1>🔥 Mobile Store Pro</h1>
<div>🛒 Cart: <span id="cart-count">0</span></div>
</header>

<div class="video">
<h2>🎥 Trending Phone Review</h2>
<br>
<iframe width="560" height="315"
src="https://www.youtube.com/embed/RH8Kkz8Q8bA"
frameborder="0" allowfullscreen></iframe>
</div>

<section class="products">

<div class="product">
<div class="badge">HOT</div>
<img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab">
<h3>iPhone 14</h3>
<p>$900</p>
<button onclick="addToCart('iPhone 14',900)">Add to Cart</button>
</div>

<div class="product">
<div class="badge">SALE</div>
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Samsung Galaxy</h3>
<p>$750</p>
<button onclick="addToCart('Samsung Galaxy',750)">Add to Cart</button>
</div>

<div class="product">
<div class="badge">NEW</div>
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Xiaomi Phone</h3>
<p>$500</p>
<button onclick="addToCart('Xiaomi Phone',500)">Add to Cart</button>
</div>

</section>

<div class="cart-box">
<h3>Your Cart</h3>
<div id="cart-items"></div>
<div class="total">Total: $<span id="total">0</span></div>
</div>

<script>

let cartCount = 0;
let total = 0;

function addToCart(name,price){
cartCount++;
total += price;

document.getElementById("cart-count").innerText = cartCount;
document.getElementById("total").innerText = total;

let item = document.createElement("div");
item.classList.add("cart-item");
item.innerText = name + " - $" + price;

document.getElementById("cart-items").appendChild(item);

// Animation feedback
item.style.opacity = 0;
setTimeout(()=>{item.style.opacity = 1;},100);

}

</script>

</body>
</html>
