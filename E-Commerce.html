<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f2f2f2;
}

/* Header */

header{
background:linear-gradient(45deg,#0072ff,#00c6ff);
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

header h1{
font-size:26px;
}

/* Video Section */

.video{
text-align:center;
padding:40px;
background:white;
}

.video iframe{
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

/* Products */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

.product{
background:white;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.product:hover{
transform:translateY(-10px);
}

.product img{
width:100%;
border-radius:10px;
height:220px;
object-fit:cover;
}

.product h3{
margin:10px 0;
}

.product p{
font-size:18px;
color:#444;
}

/* Button */

button{
background:#0072ff;
color:white;
border:none;
padding:10px 20px;
border-radius:25px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

button:hover{
background:#0056c7;
}

/* Cart */

.cart-box{
position:fixed;
right:20px;
bottom:20px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
width:260px;
}

.cart-box h3{
margin-bottom:10px;
}

.cart-item{
font-size:14px;
margin:5px 0;
border-bottom:1px solid #eee;
padding-bottom:4px;
}

.total{
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>📱 Online Mobile Store</h1>
<div>🛒 Cart: <span id="cart-count">0</span></div>
</header>

<div class="video">
<h2>Latest Smartphone Review</h2>
<br>
<iframe width="560" height="315"
src="https://www.youtube.com/embed/RH8Kkz8Q8bA"
frameborder="0" allowfullscreen></iframe>
</div>

<section class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab">
<h3>iPhone 14</h3>
<p>$900</p>
<button onclick="addToCart('iPhone 14',900)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Samsung Galaxy</h3>
<p>$750</p>
<button onclick="addToCart('Samsung Galaxy',750)">Add to Cart</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Xiaomi Phone</h3>
<p>$500</p>
<button onclick="addToCart('Xiaomi Phone',500)">Add to Cart</button>
</div>

</section>

<div class="cart-box">
<h3>Your Cart</h3>
<div id="cart-items"></div>
<div class="total">Total: $<span id="total">0</span></div>
</div>

<script>

let cartCount = 0;
let total = 0;

function addToCart(name,price){

cartCount++;
total += price;

document.getElementById("cart-count").innerText = cartCount;
document.getElementById("total").innerText = total;

let item = document.createElement("div");
item.classList.add("cart-item");
item.innerText = name + " - $" + price;

document.getElementById("cart-items").appendChild(item);

}

</script>

</body>
</html>
