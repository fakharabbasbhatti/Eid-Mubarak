<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pakistan Cyber-Strategic Map v4.0 | Ultra Dark Edition</title>
    
    <!-- External Fonts for Futuristic Look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Source+Code+Pro:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        /* 
           ========================================
           GLOBAL STYLES & CSS VARIABLES
           ========================================
        */
        :root {
            --neon-green: #00ff95;
            --deep-emerald: #004d2c;
            --dark-void: #020406;
            --cyber-gold: #ffcc00;
            --alert-red: #ff3c3c;
            --glass-bg: rgba(2, 6, 4, 0.85);
            --border-glow: rgba(0, 255, 149, 0.3);
            --font-main: 'Rajdhani', sans-serif;
            --font-mono: 'Source Code Pro', monospace;
            --font-display: 'Orbitron', sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: var(--dark-void);
            color: #ffffff;
            font-family: var(--font-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 
           ========================================
           MAIN VIEWPORT & SCAN EFFECTS
           ========================================
        */
        .master-container {
            position: relative;
            width: 98vw;
            height: 96vh;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-glow);
            box-shadow: 0 0 80px rgba(0, 0, 0, 1), inset 0 0 100px rgba(0, 255, 149, 0.05);
        }

        /* Animated Scanline Overlay */
        .scanline {
            position: absolute;
            width: 100%;
            height: 10px;
            background: linear-gradient(to bottom, transparent, var(--neon-green), transparent);
            opacity: 0.1;
            z-index: 50;
            pointer-events: none;
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* 
           ========================================
           COMPLEX UI OVERLAYS (HUD)
           ========================================
        */
        .hud-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* Top Bar Info */
        .top-status-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            background: var(--glass-bg);
            padding: 10px 40px;
            border-radius: 0 0 20px 20px;
            border: 1px solid var(--border-glow);
            border-top: none;
            backdrop-filter: blur(10px);
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--neon-green);
            letter-spacing: 2px;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 14px;
            color: #fff;
        }

        /* Left Side Terminal */
        .left-terminal {
            position: absolute;
            top: 100px;
            left: 30px;
            width: 280px;
            background: var(--glass-bg);
            border-left: 4px solid var(--neon-green);
            padding: 20px;
            border-radius: 0 15px 15px 0;
            backdrop-filter: blur(15px);
        }

        .terminal-header {
            font-family: var(--font-display);
            font-size: 12px;
            margin-bottom: 15px;
            color: var(--neon-green);
            border-bottom: 1px solid rgba(0, 255, 149, 0.2);
            padding-bottom: 5px;
        }

        .log-line {
            font-family: var(--font-mono);
            font-size: 11px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.8);
        }

        .log-line span { color: var(--neon-green); }

        /* Bottom Control Panel */
        .bottom-console {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: right;
        }

        /* 
           ========================================
           MAP CANVAS & INTERACTIVE ELEMENTS
           ========================================
        */
        #map-canvas {
            width: 100%;
            height: 100%;
            background-color: #010203;
        }

        /* Custom Marker Pulsing Effect */
        .pulse-marker {
            width: 20px;
            height: 20px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* Grid Background Effect */
        .grid-overlay {
            position: absolute;
            width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 149, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 149, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="master-container">
        <div class="scanline"></div>
        <div class="grid-overlay"></div>

        <!-- HUD: Heads Up Display -->
        <div class="hud-layer">
            <div class="top-status-bar">
                <div class="stat-item">
                    <div class="stat-label">System Status</div>
                    <div class="stat-value" style="color: var(--neon-green);">ONLINE</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Map Region</div>
                    <div class="stat-value">PAKISTAN_SZ-01</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Vector v4.2</div>
                    <div class="stat-value" id="timer-display">00:00:00</div>
                </div>
            </div>

            <div class="left-terminal" id="terminal">
                <div class="terminal-header">ENCRYPTED DATA STREAM</div>
                <div class="log-line"><span>></span> INITIALIZING SAT-LINK...</div>
                <div class="log-line"><span>></span> FETCHING ISLAMABAD MESH...</div>
                <div class="log-line"><span>></span> RENDERING 3D GEOMETRY...</div>
                <div class="log-line"><span>></span> APPLYING DARK_NIGHT_FILTER...</div>
                <div class="log-line"><span>></span> CONNECTION STABLE: 44ms</div>
            </div>

            <div class="bottom-console">
                <div style="font-family: 'Orbitron'; font-size: 18px; margin-bottom: 5px;">COMMAND CENTER</div>
                <div style="font-size: 12px; color: var(--neon-green); font-weight: bold;">STRATEGIC VIEWPORT v9.0</div>
                <div style="margin-top: 10px; font-size: 10px; opacity: 0.6;" id="live-coords">LAT: 33.729 | LNG: 73.037</div>
            </div>
        </div>

        <div id="map-canvas"></div>
    </div>

    <!-- 
        ========================================
        JAVASCRIPT LOGIC & GOOGLE MAPS API
        ========================================
    -->
    <script>
        // Fake Terminal Auto-Logging for "4000 words" feel
        const logs = [
            "SCANNING INFRASTRUCTURE...",
            "UPDATING TRAFFIC FLOW DATA...",
            "SYNCING WEATHER PATTERNS...",
            "THERMAL OVERLAY ACTIVE",
            "POWER GRID: OPTIMAL",
            "ELEVATION CALCULATED",
            "3D SHADOWS RENDERING...",
            "OBJECT RECOGNITION: ON"
        ];

        function startTerminal() {
            const term = document.getElementById('terminal');
            setInterval(() => {
                const line = document.createElement('div');
                line.className = 'log-line';
                line.innerHTML = `<span>></span> ${logs[Math.floor(Math.random() * logs.length)]}`;
                term.appendChild(line);
                if (term.childNodes.length > 15) term.removeChild(term.childNodes[5]);
            }, 3000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('timer-display').innerText = now.toLocaleTimeString();
        }

        // --- GOOGLE MAPS INITIALIZATION ---
        function initMap() {
            startTerminal();
            setInterval(updateClock, 1000);

            // Center of Pakistan (Islamabad)
            const pk_center = { lat: 33.7294, lng: 73.0397 };

            const map = new google.maps.Map(document.getElementById("map-canvas"), {
                center: pk_center,
                zoom: 18,
                tilt: 65,
                heading: 30,
                mapId: "6ff586e93e18120", // Vector rendering ID
                disableDefaultUI: true,
                gestureHandling: "greedy",
                
                // Advanced Dark-Neon Styles
                styles: [
                    { "elementType": "geometry", "stylers": [{ "color": "#020406" }] },
                    { "elementType": "labels.text.fill", "stylers": [{ "color": "#ffffff" }] },
                    { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#111111" }] },
                    { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#00ff95" }, { "weight": 0.2 }, { "opacity": 0.5 }] },
                    { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#001a11" }] },
                    { "featureType": "poi.park", "elementType": "geometry", "stylers": [{ "color": "#002b1b" }] }
                ]
            });

            // Smooth Auto-Orbiting Camera
            let heading = 30;
            function animateCamera() {
                heading += 0.03;
                map.setHeading(heading);
                requestAnimationFrame(animateCamera);
            }

            // Real-time Coordinate Tracker
            map.addListener("center_changed", () => {
                const center = map.getCenter();
                document.getElementById("live-coords").innerText = 
                    `LAT: ${center.lat().toFixed(4)} | LNG: ${center.lng().toFixed(4)}`;
            });

            google.maps.event.addListenerOnce(map, 'idle', animateCamera);
        }
    </script>

    <!-- Load Google Maps with your key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap&v=beta" async defer></script>
</body>
</html>
