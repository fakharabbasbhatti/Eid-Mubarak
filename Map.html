<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Ultra-Responsive Google Map Interface</title>
    
    <style>
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --glass-bg: rgba(20, 20, 20, 0.85);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #0f0c29; /* Dark Background Gradient */
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Map Wrapper for a Floating Effect */
        .main-wrapper {
            position: relative;
            width: 90%;
            max-width: 1100px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .header-bar {
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-bar h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Map Styling */
        #google-map-container {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        .status-badge {
            background: rgba(0, 210, 255, 0.2);
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid var(--primary-color);
        }

        /* InfoWindow Customization */
        .gm-style .gm-style-iw-c {
            background-color: #222 !important;
            color: #fff !important;
            border-radius: 12px !important;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-bar">
            <h1>Global Explorer</h1>
            <div class="status-badge">System Active</div>
        </div>

        <div id="google-map-container"></div>
    </div>

    <script>
        function initializeMap() {
            // Humne yahan Karachi, Pakistan ki coordinates li hain.
            const targetLocation = { lat: 24.8607, lng: 67.0011 };

            // Night Mode JSON Styling (Snazzy Maps Inspired)
            const darkMapStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#242f3e" }] },
                { "elementType": "labels.text.stroke", "stylers": [{ "color": "#242f3e" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#746855" }] },
                { "featureType": "administrative.locality", "elementType": "labels.text.fill", "stylers": [{ "color": "#d59563" }] },
                { "featureType": "poi", "elementType": "labels.text.fill", "stylers": [{ "color": "#d59563" }] },
                { "featureType": "road", "elementType": "geometry", "stylers": [{ "color": "#38414e" }] },
                { "featureType": "road", "elementType": "geometry.stroke", "stylers": [{ "color": "#212a37" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#17263c" }] }
            ];

            const mapOptions = {
                zoom: 13,
                center: targetLocation,
                styles: darkMapStyle,
                mapTypeControl: false,
                streetViewControl: false,
                fullscreenControl: true,
                zoomControl: true,
                gestureHandling: 'greedy'
            };

            const map = new google.maps.Map(document.getElementById("google-map-container"), mapOptions);

            // Adding a Glowing Marker
            const marker = new google.maps.Marker({
                position: targetLocation,
                map: map,
                animation: google.maps.Animation.BOUNCE,
                title: "Premium Office Location"
            });

            // Interactive Click Event
            const contentString = `
                <div style="color: #000; padding: 10px;">
                    <h3 style="margin:0">Premium HQ</h3>
                    <p style="margin:5px 0 0">Innovative Solutions Hub</p>
                </div>`;

            const infowindow = new google.maps.InfoWindow({
                content: contentString
            });

            marker.addListener("click", () => {
                infowindow.open(map, marker);
            });

            console.log("Map successfully initialized with Dark Mode.");
        }
    </script>

    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initializeMap">
    </script>

</body>
</html>
