<!DOCTYPE html>
<html>
<head>
    <title>Modern Custom Map</title>
    <style>
        /* Modern UI Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .map-container {
            width: 80%;
            height: 70vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); /* Glass effect */
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #map {
            height: 100%;
            width: 100%;
            border-radius: 15px;
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="map-container">
        <h2>Explore My World</h2>
        <div id="map"></div>
    </div>

    <script>
        function initMap() {
            // Location
            const centerPoint = { lat: 24.8607, lng: 67.0011 };

            // Custom "Silver/Dark" Map Style
            const customStyle = [
                { "elementType": "geometry", "stylers": [{ "color": "#f5f5f5" }] },
                { "elementType": "labels.icon", "stylers": [{ "visibility": "off" }] },
                { "elementType": "labels.text.fill", "stylers": [{ "color": "#616161" }] },
                { "featureType": "water", "elementType": "geometry", "stylers": [{ "color": "#c9c9c9" }] }
            ];

            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 13,
                center: centerPoint,
                styles: customStyle, // Custom look apply kiya
                disableDefaultUI: true, // फालतू buttons hata diye
                zoomControl: true
            });

            // Attractive Custom Marker
            const marker = new google.maps.Marker({
                position: centerPoint,
                map: map,
                animation: google.maps.Animation.DROP,
                title: "Karachi"
            });

            // Info Window (Jab marker pe click ho)
            const infoWindow = new google.maps.InfoWindow({
                content: '<div style="color:#333; padding:5px;"><b>Headquarters</b><br>Welcome to our office!</div>'
            });

            marker.addListener("click", () => {
                infoWindow.open(map, marker);
            });
        }
    </script>

    <script async src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap"></script>
</body>
</html>
