<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Cinematic Google Map</title>
    
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-core: #0a0a0c;
            --accent: #ff0055;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark-core);
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container for the 3D Experience */
        .viewport-3d {
            position: relative;
            width: 95vw;
            height: 90vh;
            border: 2px solid rgba(0, 242, 255, 0.3);
            border-radius: 40px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Overlay UI Elements */
        .overlay-ui {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
        }

        .card-3d {
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-left: 5px solid var(--neon-blue);
            border-radius: 0 15px 15px 0;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }

        #map-canvas {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        /* Marker Custom Styling (Logic via JS) */
        .custom-label {
            color: var(--neon-blue);
            font-weight: bold;
            text-shadow: 0 0 10px #000;
        }
    </style>
</head>
<body>

    <div class="viewport-3d">
        <div class="overlay-ui">
            <div class="card-3d">
                <h2 style="margin:0; font-size: 1.2rem;">3D PERSPECTIVE ACTIVE</h2>
                <p style="margin:5px 0; font-size: 0.8rem; opacity: 0.7;">Vector Engine: v3.56<br>Tilt: 45° | Heading: 320°</p>
            </div>
        </div>

        <div id="map-canvas"></div>
    </div>

    <script>
        function init3DMap() {
            // Humne New York (Manhattan) ke coordinates liye hain kyunki wahan 3D buildings sabse behtar dikhti hain.
            // Agar aap Karachi chahte hain to lat: 24.8607, lng: 67.0011 kar dein.
            const manhattan = { lat: 40.7588, lng: -73.9851 };

            const map = new google.maps.Map(document.getElementById("map-canvas"), {
                center: manhattan,
                zoom: 18,              // High zoom for 3D buildings
                tilt: 45,              // Important: Ye map ko 3D angle deta hai
                heading: 320,          // Map ka rukh (rotation)
                mapId: "6ff586e93e18120", // Vector Map ID (Google Cloud se banti hai)
                disableDefaultUI: false,
                gestureHandling: "cooperative",
                
                // Dark Theme Styling
                styles: [
                    { "featureType": "all", "elementType": "labels.text.fill", "stylers": [{"color": "#ffffff"}] },
                    { "featureType": "background", "stylers": [{"color": "#111111"}] },
                    { "featureType": "water", "stylers": [{"color": "#000000"}] }
                ]
            });

            // 3D Marker with Animation
            const marker = new google.maps.Marker({
                position: manhattan,
                map: map,
                title: "3D Landmark",
                animation: google.maps.Animation.DROP,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 10,
                    fillColor: "#00f2ff",
                    fillOpacity: 1,
                    strokeWeight: 2,
                    strokeColor: "#ffffff"
                }
            });

            // Rotate the map automatically for a cinematic feel
            let angle = 320;
            setInterval(() => {
                angle = (angle + 0.1) % 360;
                map.setHeading(angle);
            }, 50); // Har 50ms baad thora sa ghoomega
        }
    </script>

    <script async defer
        src="https://maps.app.goo.gl/9outYXbAmT6cMXLc7">
    </script>

</body>
</html>
