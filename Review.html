<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Review Section</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .review-container {
            max-width: 500px;
            margin: 50px auto;
        }
        #reviewList {
            max-height: 300px;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .avatar {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-radius: 50%;
        }
        .star-rating i {
            font-size: 1.5rem;
            cursor: pointer;
            color: #ddd;
            transition: color 0.2s;
        }
        .star-rating i.active {
            color: #ffc107;
        }
        .text-warning-stars {
            color: #ffc107;
        }
    </style>
</head>
<body>

<div class="container review-container">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex align-items-center">
            <i class="fas fa-comments me-2"></i>
            <h5 class="mb-0">Customer Reviews</h5>
        </div>
        
        <div class="card-body">
            <div id="reviewList" class="mb-4">
                <p class="text-muted text-center py-3">No reviews yet. Be the first!</p>
            </div>

            <hr>

            <div class="review-form mt-4">
                <h6 class="fw-bold mb-3">Leave a Review</h6>
                
                <div class="mb-3">
                    <label class="form-label small fw-bold">Your Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" id="nameInput" class="form-control" placeholder="John Doe">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold d-block">Rating</label>
                    <div class="star-rating" id="starSelect">
                        <i class="fas fa-star" data-value="1"></i>
                        <i class="fas fa-star" data-value="2"></i>
                        <i class="fas fa-star" data-value="3"></i>
                        <i class="fas fa-star" data-value="4"></i>
                        <i class="fas fa-star" data-value="5"></i>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-bold">Message</label>
                    <textarea id="reviewInput" class="form-control" rows="3" placeholder="Tell us about your experience..."></textarea>
                </div>

                <button onclick="addReview()" class="btn btn-dark w-100 py-2">
                    <i class="fas fa-paper-plane me-2"></i>Submit Review
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let selectedRating = 0;
const stars = document.querySelectorAll("#starSelect i");

// Star Selection Logic
stars.forEach(star => {
    star.addEventListener("click", () => {
        selectedRating = star.getAttribute("data-value");
        updateStars();
    });

    star.addEventListener("mouseover", () => {
        highlightStars(star.getAttribute("data-value"));
    });

    star.addEventListener("mouseout", () => {
        updateStars();
    });
});

function highlightStars(val) {
    stars.forEach((s, index) => {
        s.classList.toggle("active", index < val);
    });
}

function updateStars() {
    stars.forEach((s, index) => {
        s.classList.toggle("active", index < selectedRating);
    });
}

function addReview() {
    const name = document.getElementById("nameInput").value.trim();
    const text = document.getElementById("reviewInput").value.trim();
    const reviewList = document.getElementById("reviewList");

    if (name === "" || text === "" || selectedRating == 0) {
        alert("Please fill all fields and select a rating!");
        return;
    }

    // Remove "No reviews yet" message on first entry
    if (reviewList.querySelector('.text-muted')) {
        reviewList.innerHTML = '';
    }

    // Create Review Element
    const item = document.createElement("div");
    item.className = "d-flex gap-3 mb-3 pb-3 border-bottom animate__animated animate__fadeIn";

    // Star Icons for Display
    let starsHtml = '';
    for(let i=1; i<=5; i++) {
        starsHtml += `<i class="fa-solid fa-star ${i <= selectedRating ? 'text-warning-stars' : 'text-light-emphasis'}"></i>`;
    }

    item.innerHTML = `
        <div class="avatar bg-primary text-white shadow-sm">
            ${name.charAt(0).toUpperCase()}
        </div>
        <div class="flex-grow-1">
            <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold text-dark">${name}</span>
                <small class="text-muted" style="font-size: 11px;">Just now</small>
            </div>
            <div class="mb-1" style="font-size: 13px;">
                ${starsHtml}
            </div>
            <p class="mb-0 text-secondary small">${text}</p>
        </div>
    `;

    reviewList.appendChild(item);

    // Reset Form
    document.getElementById("nameInput").value = "";
    document.getElementById("reviewInput").value = "";
    selectedRating = 0;
    updateStars();

    // Auto scroll to bottom
    reviewList.scrollTop = reviewList.scrollHeight;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
