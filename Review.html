<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Review UI</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }

        .header-gradient {
            background: linear-gradient(to right, #243b55, #141e30);
            padding: 25px;
            text-align: center;
            color: white;
        }

        #reviewList {
            max-height: 320px;
            overflow-y: auto;
            padding: 10px;
            scrollbar-width: none; /* Firefox */
        }
        #reviewList::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .review-card {
            background: #fff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid #764ba2;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .review-card:hover { transform: translateY(-3px); }

        .avatar-circle {
            width: 45px;
            height: 45px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(118, 75, 162, 0.3);
        }

        .star-rating i {
            font-size: 1.4rem;
            cursor: pointer;
            color: #e0e0e0;
            transition: all 0.2s ease;
        }
        .star-rating i.active {
            color: #ffc107;
            text-shadow: 0 0 10px rgba(255, 193, 7, 0.4);
        }

        .btn-submit {
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            font-weight: 600;
            padding: 12px;
            transition: all 0.3s;
        }
        .btn-submit:hover {
            opacity: 0.9;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }

        .form-control {
            border-radius: 10px;
            border: 1px solid #eee;
            padding: 10px 15px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
            border-color: #764ba2;
        }
    </style>
</head>
<body>

<div class="glass-card animate__animated animate__zoomIn">
    <div class="header-gradient">
        <h4 class="mb-0 fw-bold"><i class="fas fa-star-half-alt me-2"></i>User Feedback</h4>
        <small class="opacity-75">We value your opinion</small>
    </div>

    <div class="card-body p-4">
        <div id="reviewList">
            <div class="text-center py-4 text-muted">
                <i class="fas fa-comment-dots fa-3x mb-3 opacity-25"></i>
                <p>Share your experience with us!</p>
            </div>
        </div>

        <hr class="my-4">

        <div class="form-section">
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0"><i class="fas fa-user text-muted"></i></span>
                    <input type="text" id="nameInput" class="form-control border-start-0" placeholder="Your Full Name">
                </div>
            </div>

            <div class="text-center mb-3">
                <div class="star-rating" id="starSelect">
                    <i class="fas fa-star" data-value="1"></i>
                    <i class="fas fa-star" data-value="2"></i>
                    <i class="fas fa-star" data-value="3"></i>
                    <i class="fas fa-star" data-value="4"></i>
                    <i class="fas fa-star" data-value="5"></i>
                </div>
                <small class="text-muted">Tap to rate</small>
            </div>

            <div class="mb-3">
                <textarea id="reviewInput" class="form-control" rows="3" placeholder="Tell us what you liked..."></textarea>
            </div>

            <button onclick="addReview()" class="btn btn-primary btn-submit w-100 text-white">
                Post Review <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </div>
    </div>
</div>

<script>
    let selectedRating = 0;
    const stars = document.querySelectorAll("#starSelect i");

    stars.forEach(star => {
        star.addEventListener("click", () => {
            selectedRating = star.getAttribute("data-value");
            updateStars();
        });
        star.addEventListener("mouseover", () => highlightStars(star.getAttribute("data-value")));
        star.addEventListener("mouseout", () => updateStars());
    });

    function highlightStars(val) {
        stars.forEach((s, i) => s.classList.toggle("active", i < val));
    }

    function updateStars() {
        stars.forEach((s, i) => s.classList.toggle("active", i < selectedRating));
    }

    function addReview() {
        const name = document.getElementById("nameInput").value.trim();
        const text = document.getElementById("reviewInput").value.trim();
        const list = document.getElementById("reviewList");

        if (!name || !text || selectedRating == 0) {
            return alert("Oops! Please complete the form.");
        }

        // Clear placeholder
        if (list.querySelector('.text-muted')) list.innerHTML = '';

        const div = document.createElement("div");
        div.className = "review-card animate__animated animate__fadeInUp";
        
        let starIcons = '';
        for(let i=1; i<=5; i++) {
            starIcons += `<i class="fas fa-star ${i <= selectedRating ? 'text-warning' : 'text-light'}"></i>`;
        }

        div.innerHTML = `
            <div class="d-flex align-items-center gap-3 mb-2">
                <div class="avatar-circle">${name.charAt(0).toUpperCase()}</div>
                <div>
                    <h6 class="mb-0 fw-bold">${name}</h6>
                    <div style="font-size: 12px;">${starIcons}</div>
                </div>
            </div>
            <p class="mb-0 text-muted small" style="line-height: 1.6;">"${text}"</p>
        `;

        list.prepend(div); // New review top pe dikhayi degi

        // Reset
        document.getElementById("nameInput").value = "";
        document.getElementById("reviewInput").value = "";
        selectedRating = 0;
        updateStars();
    }
</script>

</body>
</html>
