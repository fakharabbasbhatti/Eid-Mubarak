
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Gift 🌙</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#020024,#090979,#000000);
color:white;
text-align:center;
height:100vh;
font-family:Segoe UI;
}

.title{
margin-top:40px;
font-size:55px;
color:gold;
text-shadow:0 0 20px gold;
}

#scene{
height:300px;
}

input{
max-width:300px;
margin:auto;
text-align:center;
}

.gift-box{
display:none;
margin-top:30px;
font-size:24px;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">🌙 Eid Mubarak 🌙</h1>

<p>Type someone's name and send Eid gift 🎁</p>

<input id="nameInput" class="form-control" placeholder="Enter Name">

<br>

<button onclick="createGift()" class="btn btn-warning">
Send Eid Gift 🎁
</button>

<div id="giftMessage" class="gift-box"></div>

<div id="scene"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* Gift message */

function createGift(){

let name = document.getElementById("nameInput").value;

if(name===""){
alert("Please enter a name");
return;
}

let message = `
✨ Eid Mubarak ${name}! ✨ <br><br>
Allah apko sehat, khushi aur kamyabi de.
Aapki zindagi barkat se bhar jaye.
`;

document.getElementById("giftMessage").style.display="block";
document.getElementById("giftMessage").innerHTML=message;

}


/* 3D Animation */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/300,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,300);

document.getElementById("scene").appendChild(renderer.domElement);

const geometry = new THREE.TorusGeometry(2,0.7,16,100);

const material = new THREE.MeshStandardMaterial({
color:0xffd700,
metalness:1,
roughness:0.4
});

const moon = new THREE.Mesh(geometry,material);

scene.add(moon);

const light = new THREE.PointLight(0xffffff,1);

light.position.set(10,10,10);

scene.add(light);

camera.position.z=6;

function animate(){

requestAnimationFrame(animate);

moon.rotation.x +=0.01;
moon.rotation.y +=0.01;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
