
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak 🌙</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS Animation -->
<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

body{
background: radial-gradient(circle at top,#0b1d51,#000000);
color:white;
height:100vh;
overflow:hidden;
font-family: 'Segoe UI', sans-serif;
text-align:center;
}

.title{
margin-top:40px;
font-size:60px;
color:gold;
text-shadow:0 0 25px gold;
}

.subtitle{
font-size:20px;
margin-bottom:20px;
opacity:0.9;
}

#scene-container{
width:100%;
height:400px;
}

.gift-btn{
margin-top:20px;
font-size:20px;
padding:10px 30px;
border-radius:30px;
box-shadow:0 0 20px gold;
}

.dua-box{
margin-top:20px;
font-size:22px;
display:none;
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
backdrop-filter: blur(5px);
}

/* stars background */

.star{
position:absolute;
background:white;
width:2px;
height:2px;
animation: twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="container">

<h1 class="title" data-aos="fade-down">
🌙 Eid Mubarak 🌙
</h1>

<p class="subtitle" data-aos="fade-up">
May Allah fill your life with happiness and blessings
</p>

<div id="scene-container"></div>

<button class="btn btn-warning gift-btn" onclick="showGift()">
Open Eid Gift 🎁
</button>

<div id="duaBox" class="dua-box">
✨ Allah apko sehat, khushi aur kamyabi de. Eid Mubarak! ✨
</div>

</div>

<!-- Libraries -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>

AOS.init();

/* 3D Scene */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/400,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,400);

document.getElementById("scene-container").appendChild(renderer.domElement);

/* Moon */

const geometry = new THREE.TorusGeometry(3,1,16,100);

const material = new THREE.MeshStandardMaterial({
color:0xffd700,
metalness:1,
roughness:0.3
});

const moon = new THREE.Mesh(geometry,material);
scene.add(moon);

/* Light */

const light = new THREE.PointLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

camera.position.z = 10;

/* Animation */

function animate(){

requestAnimationFrame(animate);

moon.rotation.x += 0.01;
moon.rotation.y += 0.01;

renderer.render(scene,camera);

}

animate();

/* Gift button */

function showGift(){
document.getElementById("duaBox").style.display="block";
}

/* Random stars */

for(let i=0;i<80;i++){

let star=document.createElement("div");
star.className="star";

star.style.left=Math.random()*100+"%";
star.style.top=Math.random()*100+"%";

document.body.appendChild(star);

}

</script>

</body>
</html>
```
