<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WP Security Pro | Enterprise Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0b0f1a;
            --card-bg: rgba(23, 28, 45, 0.8);
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        /* Stats Boxes */
        .stat-box {
            padding: 20px;
            text-align: center;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s ease;
        }
        .stat-box h3 { font-weight: 700; margin: 0; color: var(--primary); }
        .stat-box p { font-size: 0.8rem; color: #94a3b8; margin: 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Checklist Items */
        .task-item {
            display: flex;
            align-items: center;
            padding: 18px 24px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .task-item:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(8px);
            border-color: var(--primary);
        }

        .task-item.active-task {
            border-left: 4px solid var(--primary);
        }

        .checkbox-custom {
            width: 24px;
            height: 24px;
            border-radius: 8px;
            border: 2px solid #475569;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        input[type="checkbox"]:checked + .checkbox-custom {
            background: var(--primary);
            border-color: var(--primary);
        }

        .task-item.done {
            opacity: 0.5;
        }
        .task-item.done .task-text { text-decoration: line-through; color: #64748b; }

        /* Progress Animation */
        .progress { height: 10px; background: #1e293b; border-radius: 20px; }
        .progress-bar { 
            background: linear-gradient(90deg, #6366f1, #a855f7); 
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .pulse-complete {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .btn-reset {
            background: transparent;
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            font-size: 0.8rem;
            padding: 5px 15px;
            border-radius: 8px;
        }
        .btn-reset:hover { background: rgba(239, 68, 68, 0.1); }

    </style>
</head>
<body>

<div class="container py-5">
    
    <div class="row align-items-center mb-5">
        <div class="col-md-6">
            <h1 class="fw-bold mb-1">WP <span style="color: var(--primary);">Guard</span> Pro</h1>
            <p class="text-secondary mb-0">Security Health Monitoring System</p>
        </div>
        <div class="col-md-6 text-md-end mt-3 mt-md-0">
            <button class="btn-reset" onclick="resetTasks()">
                <i class="fa-solid fa-rotate-right me-1"></i> Reset Progress
            </button>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="glass-card p-4 h-100">
                <h5 class="mb-4 fw-bold"><i class="fa-solid fa-chart-pie me-2 text-primary"></i> Security Stats</h5>
                
                <div class="row g-3">
                    <div class="col-6">
                        <div class="stat-box">
                            <h3 id="statTotal">0</h3>
                            <p>Tasks</p>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="stat-box">
                            <h3 id="statPending" class="text-warning">0</h3>
                            <p>Pending</p>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="stat-box" style="background: rgba(16, 185, 129, 0.05);">
                            <h3 id="statDone" class="text-success">0</h3>
                            <p>Completed</p>
                        </div>
                    </div>
                </div>

                <div class="mt-5">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="small text-secondary">Integrity Score</span>
                        <span id="progressPercent" class="small fw-bold">0%</span>
                    </div>
                    <div class="progress" id="progressWrapper">
                        <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="glass-card p-4">
                <div id="taskList">
                    </div>
            </div>
        </div>
    </div>
</div>

<script>
    const taskData = [
        { icon: "fa-trash-can", color: "text-danger", title: "Malware Clean-up", desc: "Remove inactive plugins and themes." },
        { icon: "fa-shield-virus", color: "text-info", title: "Core Integrity Scan", desc: "Verify WordPress core file checksums." },
        { icon: "fa-firewall", color: "text-success", title: "Firewall Configuration", desc: "Active protection against SQLi & XSS." },
        { icon: "fa-user-shield", color: "text-warning", title: "Login Hardening", desc: "Limit login attempts and block IPs." },
        { icon: "fa-robot", color: "text-primary", title: "Bot Protection", desc: "Enable reCAPTCHA v3 on all forms." },
        { icon: "fa-file-code", color: "text-secondary", title: "Disable XML-RPC", desc: "Prevent brute force and DDoS via RPC." }
    ];

    let tasks = JSON.parse(localStorage.getItem("wp_tasks")) || new Array(taskData.length).fill(false);

    function renderTasks() {
        const container = document.getElementById('taskList');
        container.innerHTML = taskData.map((task, i) => `
            <div class="task-item ${tasks[i] ? 'done' : ''}" onclick="toggleTask(${i})">
                <div class="checkbox-wrapper">
                    <input type="checkbox" ${tasks[i] ? 'checked' : ''} style="display:none">
                    <div class="checkbox-custom">
                        ${tasks[i] ? '<i class="fa-solid fa-check text-white small"></i>' : ''}
                    </div>
                </div>
                <div class="flex-grow-1">
                    <div class="fw-bold task-text d-flex align-items-center">
                        <i class="fa-solid ${task.icon} ${task.color} me-2"></i>
                        ${task.title}
                    </div>
                    <div class="small text-secondary" style="font-size: 0.75rem;">${task.desc}</div>
                </div>
                <div class="ms-auto">
                    <i class="fa-solid fa-chevron-right text-secondary small"></i>
                </div>
            </div>
        `).join('');
        updateStats();
    }

    function toggleTask(index) {
        tasks[index] = !tasks[index];
        localStorage.setItem("wp_tasks", JSON.stringify(tasks));
        renderTasks();
    }

    function updateStats() {
        const total = tasks.length;
        const done = tasks.filter(t => t).length;
        const pending = total - done;
        const percent = Math.round((done / total) * 100);

        document.getElementById('statTotal').innerText = total;
        document.getElementById('statDone').innerText = done;
        document.getElementById('statPending').innerText = pending;
        document.getElementById('progressPercent').innerText = percent + "%";
        
        const bar = document.getElementById('progressBar');
        bar.style.width = percent + "%";

        // Success Pulse Effect
        if(percent === 100) {
            document.getElementById('progressWrapper').classList.add('pulse-complete');
            bar.classList.replace('bg-primary', 'bg-success');
        } else {
            document.getElementById('progressWrapper').classList.remove('pulse-complete');
        }
    }

    function resetTasks() {
        if(confirm("Are you sure you want to reset all progress?")) {
            tasks = new Array(taskData.length).fill(false);
            localStorage.setItem("wp_tasks", JSON.stringify(tasks));
            renderTasks();
        }
    }

    renderTasks();
</script>

</body>
</html>
