<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WP Security Pro Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #38bdf8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 41, 59, 0.8) 0px, transparent 50%);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .list-group-item {
            background: rgba(255, 255, 255, 0.03);
            color: #cbd5e1;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            border-radius: 12px !important;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 1rem;
        }

        .list-group-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: var(--accent-blue);
        }

        /* Modern Checkbox styling */
        .form-check-input {
            width: 1.3em;
            height: 1.3em;
            background-color: #334155;
            border-color: #475569;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .done {
            opacity: 0.6;
        }

        .done .task-text {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .progress {
            height: 8px;
            background-color: #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #0ea5e9, #22d3ee);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .header-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5));
        }

        .status-badge {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center mb-5">
        <div class="col-md-8 text-center">
            <i class="fa-solid fa-shield-halved text-info header-icon mb-3"></i>
            <h1 class="fw-bold">Security Posture</h1>
            <p class="text-secondary">WordPress Hardening & Threat Mitigation Checklist</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-7">
            
            <div class="glass-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="status-badge text-info">System Integrity</span>
                    <span id="progressText" class="fw-bold">0%</span>
                </div>
                <div class="progress">
                    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="glass-card p-4">
                <div class="list-group list-group-flush" id="taskList">

                    <label class="list-group-item">
                        <input class="form-check-input me-3" type="checkbox" onclick="toggle(this,0)">
                        <span class="flex-grow-1 task-text">
                            <i class="fa-solid fa-trash-can text-danger me-2"></i> Purge Suspicious Plugins & Themes
                        </span>
                    </label>

                    <label class="list-group-item">
                        <input class="form-check-input me-3" type="checkbox" onclick="toggle(this,1)">
                        <span class="flex-grow-1 task-text">
                            <i class="fa-solid fa-file-shield text-info me-2"></i> Audit Core File Integrity
                        </span>
                    </label>

                    <label class="list-group-item">
                        <input class="form-check-input me-3" type="checkbox" onclick="toggle(this,2)">
                        <span class="flex-grow-1 task-text">
                            <i class="fa-solid fa-plug-circle-check text-success me-2"></i> Configure Web Application Firewall
                        </span>
                    </label>

                    <label class="list-group-item">
                        <input class="form-check-input me-3" type="checkbox" onclick="toggle(this,3)">
                        <span class="flex-grow-1 task-text">
                            <i class="fa-solid fa-user-lock text-warning me-2"></i> Implement IP Access Controls
                        </span>
                    </label>

                    <label class="list-group-item">
                        <input class="form-check-input me-3" type="checkbox" onclick="toggle(this,4)">
                        <span class="flex-grow-1 task-text">
                            <i class="fa-solid fa-robot text-primary me-2"></i> Deploy Google reCAPTCHA v3
                        </span>
                    </label>

                    <label class="list-group-item">
                        <input class="form-check-input me-3" type="checkbox" onclick="toggle(this,5)">
                        <span class="flex-grow-1 task-text">
                            <i class="fa-solid fa-key text-light me-2"></i> Deactivate XML-RPC Endpoint
                        </span>
                    </label>

                </div>
            </div>

            <p class="text-center mt-4 text-secondary small">
                <i class="fa-solid fa-circle-info me-1"></i> Data is stored locally in your browser.
            </p>
        </div>
    </div>
</div>

<script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [false,false,false,false,false,false];

    function loadTasks() {
        let list = document.querySelectorAll("#taskList .form-check-input");
        list.forEach((checkbox, i) => {
            checkbox.checked = tasks[i];
            if(tasks[i]) checkbox.closest(".list-group-item").classList.add("done");
        });
        updateProgress();
    }

    function toggle(el, index) {
        tasks[index] = el.checked;
        localStorage.setItem("tasks", JSON.stringify(tasks));

        if (el.checked) {
            el.closest(".list-group-item").classList.add("done");
        } else {
            el.closest(".list-group-item").classList.remove("done");
        }
        updateProgress();
    }

    function updateProgress() {
        let completed = tasks.filter(t => t).length;
        let percent = Math.round((completed / tasks.length) * 100);
        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("progressText").innerText = percent + "%";
    }

    loadTasks();
</script>

</body>
</html>
