<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Glass Login</title>

<style>
:root {
    --primary: #00f2fe;
    --secondary: #4facfe;
    --glass: rgba(255, 255, 255, 0.08);
}

body {
    margin: 0;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #1a1a2e, #0f0c29);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    perspective: 1200px;
}

/* MULTIPLE BLOBS */
.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.7;
    animation: float 12s infinite alternate ease-in-out;
}

.blob:nth-child(1) {
    width: 300px;
    height: 300px;
    background: #00f2fe;
    top: 10%;
    left: 10%;
}

.blob:nth-child(2) {
    width: 250px;
    height: 250px;
    background: #4facfe;
    bottom: 10%;
    right: 10%;
}

@keyframes float {
    from { transform: translateY(-40px) scale(1); }
    to { transform: translateY(40px) scale(1.2); }
}

/* CARD */
.login-container {
    position: relative;
    padding: 50px 40px;
    width: 350px;
    border-radius: 20px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    transform-style: preserve-3d;
    transition: transform 0.2s ease-out;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    overflow: hidden;
}

/* GLOW BORDER */
.login-container::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 20px;
    background: linear-gradient(45deg, var(--primary), var(--secondary), transparent);
    z-index: -1;
    animation: rotate 6s linear infinite;
}

@keyframes rotate {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

h2 {
    color: white;
    letter-spacing: 2px;
    margin-bottom: 30px;
    transform: translateZ(40px);
}

/* FLOATING INPUT */
.input-group {
    position: relative;
    margin-bottom: 25px;
    transform: translateZ(30px);
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

label {
    position: absolute;
    left: 12px;
    top: 12px;
    color: #aaa;
    font-size: 14px;
    pointer-events: none;
    transition: 0.3s;
}

input:focus + label,
input:valid + label {
    top: -8px;
    font-size: 11px;
    color: var(--primary);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, var(--primary), var(--secondary));
    font-weight: bold;
    cursor: pointer;
    transform: translateZ(40px);
    transition: 0.3s;
}

button:hover {
    transform: translateZ(60px) scale(1.05);
    box-shadow: 0 0 20px rgba(0,242,254,0.6);
}

/* MESSAGE */
#message {
    margin-top: 15px;
    font-size: 14px;
    transform: translateZ(30px);
}

/* SHAKE */
@keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-8px)}
    75%{transform:translateX(8px)}
}
</style>
</head>

<body>

<div class="blob"></div>
<div class="blob"></div>

<div class="login-container" id="card">
    <h2>LOGIN</h2>

    <form id="loginForm">
        <div class="input-group">
            <input type="text" id="username" required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" id="password" required>
            <label>Password</label>
        </div>

        <button type="submit">LOGIN</button>
    </form>

    <p id="message"></p>
</div>

<script>
const card = document.getElementById('card');

// SMOOTHER 3D EFFECT
document.addEventListener('mousemove', e => {
    let x = (window.innerWidth/2 - e.pageX) / 25;
    let y = (window.innerHeight/2 - e.pageY) / 25;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

document.addEventListener('mouseleave', () => {
    card.style.transform = "rotateY(0) rotateX(0)";
});

// LOGIN LOGIC
document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();

    let user = username.value;
    let pass = password.value;
    let msg = document.getElementById('message');

    if(user === "admin" && pass === "12345"){
        msg.style.color = "#00ff88";
        msg.innerText = "✔ Access Granted";
    } else {
        msg.style.color = "#ff4d4d";
        msg.innerText = "✖ Invalid Credentials";
        card.style.animation = "shake 0.3s";
        setTimeout(()=>card.style.animation="",300);
    }
});
</script>

</body>
</html>
