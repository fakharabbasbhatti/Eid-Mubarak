<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Modern Login Tool</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* 3D Depth create karne ke liye */
            perspective: 1000px;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            width: 350px;
            text-align: center;
            
            /* 3D Effects */
            transform-style: preserve-3d;
            transform: rotateX(10deg) rotateY(-10deg);
            box-shadow: 
                20px 20px 50px rgba(0,0,0,0.5),
                -5px -5px 15px rgba(255,255,255,0.1);
            
            transition: transform 0.5s ease, box-shadow 0.5s ease;
        }

        /* Hover karne par box seedha ho jayega */
        .login-container:hover {
            transform: rotateX(0deg) rotateY(0deg) translateZ(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 25px;
            color: #1a1a2e;
            transform: translateZ(30px); /* Text ko thoda bahar nikalne ke liye */
        }

        .input-group {
            margin-bottom: 20px;
            transform: translateZ(20px);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            background: #f9f9f9;
        }

        input:focus {
            border-color: #4e00c2;
            box-shadow: 0 0 10px rgba(78, 0, 194, 0.2);
            background: #fff;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #4e00c2, #007bff);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transform: translateZ(40px); /* Button sabse upar lagega */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        button:hover {
            transform: translateZ(50px) scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        #message {
            margin-top: 20px;
            font-weight: bold;
            transform: translateZ(20px);
        }

        .show-pass-container {
            text-align: left;
            margin-bottom: 15px;
            font-size: 14px;
            color: #444;
            transform: translateZ(20px);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>3D LOGIN</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="show-pass-container">
                <input type="checkbox" id="showPass" style="width: auto;"> Show Password
            </div>
            <button type="submit">Unlock System</button>
        </form>
        <p id="message"></p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const passInput = document.getElementById('password');
        const showPassCheckbox = document.getElementById('showPass');
        const message = document.getElementById('message');

        showPassCheckbox.addEventListener('change', function() {
            passInput.type = this.checked ? 'text' : 'password';
        });

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = passInput.value;

            if (user === "admin" && pass === "12345") {
                message.style.color = "#28a745";
                message.innerText = "✅ Access Granted!";
            } else {
                message.style.color = "#dc3545";
                message.innerText = "❌ Access Denied!";
                
                // Galat password par thoda shake effect (optional)
                document.querySelector('.login-container').style.animation = "shake 0.2s ease-in-out 0s 2";
            }
        });
    </script>

</body>
</html>
