<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>
  
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background-color: #141414;
      color: white;
      font-family: Arial, sans-serif;
    }

    .navbar {
      background: rgba(0,0,0,0.8);
    }

    .hero {
      height: 80vh;
      background: url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover no-repeat;
      display: flex;
      align-items: center;
      padding: 50px;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: bold;
    }

    .movie-row {
      margin: 20px 0;
    }

    .movie-card {
      transition: transform 0.3s;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: scale(1.1);
    }

    .footer {
      background: #000;
      padding: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand text-danger fw-bold" href="#">NETFLIX</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">TV Shows</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Movies</a></li>
        <li class="nav-item"><a class="nav-link" href="#"><i class="fa fa-search"></i></a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Hero Section -->
<div class="hero">
  <div>
    <h1>Featured Movie</h1>
    <p>Watch now the latest blockbuster movie.</p>
    <button class="btn btn-danger"><i class="fa fa-play"></i> Play</button>
  </div>
</div>

<!-- Movies Section -->
<div class="container">

  <div class="movie-row">
    <h4>Trending Now</h4>
    <div class="row" id="movies"></div>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  <p>Netflix Clone © 2026</p>
</div>

<!-- JS -->
<script>
  const movies = [
    "https://picsum.photos/200/300?1",
    "https://picsum.photos/200/300?2",
    "https://picsum.photos/200/300?3",
    "https://picsum.photos/200/300?4",
    "https://picsum.photos/200/300?5",
    "https://picsum.photos/200/300?6"
  ];

  const movieContainer = document.getElementById('movies');

  movies.forEach(img => {
    movieContainer.innerHTML += `
      <div class="col-6 col-md-3 col-lg-2">
        <img src="${img}" class="img-fluid movie-card">
      </div>
    `;
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
