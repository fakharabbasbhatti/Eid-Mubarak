<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Neon Typewriter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    margin: 0;
    height: 100vh;
    background: #000;
    color: white;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* Animated Grid Background */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: linear-gradient(#0ff 1px, transparent 1px),
                      linear-gradient(90deg, #0ff 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveGrid 10s linear infinite;
    opacity: 0.1;
}

@keyframes moveGrid {
    0% { transform: translate(0,0); }
    100% { transform: translate(-50px, -50px); }
}

/* Neon Gradient Text */
h1 {
    font-size: 3rem;
    background: linear-gradient(90deg, #0ff, #f0f, #0ff);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: neonMove 3s linear infinite;
}

@keyframes neonMove {
    0% { background-position: 0%; }
    100% { background-position: 200%; }
}

/* Typewriter */
#type-text {
    font-size: 2rem;
    border-right: 3px solid #0ff;
    padding-right: 8px;
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
    animation: blink 0.7s infinite;
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* Glass Card */
.box {
    padding: 50px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 20px #0ff, inset 0 0 20px #0ff;
    position: relative;
    z-index: 2;
}

/* Neon Button */
.btn-neon {
    margin-top: 20px;
    padding: 10px 25px;
    border: 2px solid #0ff;
    color: #0ff;
    background: transparent;
    transition: 0.3s;
}

.btn-neon:hover {
    background: #0ff;
    color: #000;
    box-shadow: 0 0 10px #0ff, 0 0 40px #0ff;
}

/* Mouse Glow */
.glow {
    position: fixed;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(0,255,255,0.3), transparent 70%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
}
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<div class="container d-flex justify-content-center align-items-center vh-100 text-center">
    <div class="box">
        <h1><i class="fa-solid fa-bolt"></i> Neon Future</h1>
        <h2 id="type-text"></h2>
        <button class="btn-neon">Explore</button>
    </div>
</div>

<script>
// Typewriter
const textArray = [
    "System Loading...",
    "Neon Interface Ready ⚡",
    "Welcome Hacker 😎",
    "Access Granted 🚀"
];

let i = 0, j = 0, isDeleting = false;

function type() {
    let el = document.getElementById("type-text");
    let text = textArray[i];

    el.textContent = isDeleting ? text.substring(0, j--) : text.substring(0, j++);

    if (!isDeleting && j === text.length) {
        isDeleting = true;
        return setTimeout(type, 1000);
    }

    if (isDeleting && j === 0) {
        isDeleting = false;
        i = (i + 1) % textArray.length;
    }

    setTimeout(type, isDeleting ? 50 : 100);
}

document.addEventListener("DOMContentLoaded", type);

// Mouse Glow Effect
const glow = document.getElementById("glow");

document.addEventListener("mousemove", e => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
