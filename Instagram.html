<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone - Clean Edition</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #fafafa;
            color: #262626;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #ffffff !important;
            border-bottom: 1px solid #dbdbdb !important;
            height: 60px;
        }
        .insta-logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 28px;
            color: #262626;
            text-decoration: none;
        }

        /* Stories Section */
        .story-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }
        .story-card::-webkit-scrollbar { display: none; }
        
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 66px;
        }
        .story-ring {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            padding: 2px;
            margin-bottom: 5px;
        }
        .story-ring img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }
        .story-item span {
            font-size: 12px;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Post Card */
        .post-card {
            background: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .post-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-img {
            width: 100%;
            height: auto;
            border-top: 1px solid #efefef;
            border-bottom: 1px solid #efefef;
        }
        .post-actions {
            padding: 12px 16px;
        }
        .action-btn {
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .action-btn:hover { color: #8e8e8e; }
        .fa-heart.active { color: #ed4956; }

        /* Sidebar (Desktop Only) */
        .sidebar-user {
            position: sticky;
            top: 90px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <div class="col-md-4"><a class="insta-logo" href="#">Instagram</a></div>
            <div class="col-md-4 d-none d-md-block text-center">
                <input type="text" class="form-control bg-light border-0" placeholder="Search" style="max-width: 260px; font-size: 14px;">
            </div>
            <div class="col-md-4 text-end d-flex justify-content-end gap-3 align-items-center">
                <i class="fa-solid fa-house fs-5"></i>
                <i class="fa-regular fa-paper-plane fs-5"></i>
                <i class="fa-regular fa-square-plus fs-5"></i>
                <i class="fa-regular fa-compass fs-5"></i>
                <i class="fa-regular fa-heart fs-5"></i>
                <img src="https://i.pravatar.cc/150?u=myprofile" class="user-avatar" alt="profile">
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="story-card" id="stories-box">
                    </div>

                <div id="posts-box">
                    </div>
            </div>

            <div class="col-lg-3 d-none d-lg-block">
                <div class="sidebar-user">
                    <div class="d-flex align-items-center justify-content-between mb-4">
                        <div class="d-flex align-items-center gap-3">
                            <img src="https://i.pravatar.cc/150?u=myprofile" class="rounded-circle" style="width: 56px;">
                            <div>
                                <div class="fw-bold">my_account</div>
                                <div class="text-muted small">User Name</div>
                            </div>
                        </div>
                        <a href="#" class="text-primary text-decoration-none small fw-bold">Switch</a>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted fw-bold small">Suggestions for you</span>
                        <a href="#" class="text-dark text-decoration-none small fw-bold">See All</a>
                    </div>
                    </div>
            </div>

        </div>
    </div>

    <script>
        const users = ['john_doe', 'travel_guru', 'web_designer', 'fitness_fan', 'nature_lover', 'coding_pro'];
        
        // Render Stories
        const storiesBox = document.getElementById('stories-box');
        storiesBox.innerHTML = users.map(u => `
            <div class="story-item">
                <div class="story-ring">
                    <img src="https://i.pravatar.cc/150?u=${u}">
                </div>
                <span>${u}</span>
            </div>
        `).join('');

        // Render Posts
        const postsData = [
            { user: 'travel_guru', loc: 'Maldives', img: 'https://picsum.photos/id/10/600/600', likes: '1,450', caption: 'Living my best life in paradise! 🏝️' },
            { user: 'web_designer', loc: 'Remote Office', img: 'https://picsum.photos/id/1/600/600', likes: '892', caption: 'Clean code, clean desk. 💻✨ #development' }
        ];

        const postsBox = document.getElementById('posts-box');
        postsBox.innerHTML = postsData.map(p => `
            <div class="post-card">
                <div class="post-header">
                    <div class="d-flex align-items-center gap-2">
                        <img src="https://i.pravatar.cc/150?u=${p.user}" class="user-avatar">
                        <div>
                            <div class="fw-bold small">${p.user}</div>
                            <div class="text-muted" style="font-size: 11px;">${p.loc}</div>
                        </div>
                    </div>
                    <i class="fa-solid fa-ellipsis"></i>
                </div>
                <img src="${p.img}" class="post-img">
                <div class="post-actions">
                    <div class="d-flex justify-content-between mb-2">
                        <div>
                            <i class="fa-regular fa-heart action-btn" onclick="toggleLike(this)"></i>
                            <i class="fa-regular fa-comment action-btn"></i>
                            <i class="fa-regular fa-paper-plane action-btn"></i>
                        </div>
                        <i class="fa-regular fa-bookmark action-btn me-0"></i>
                    </div>
                    <div class="fw-bold small mb-1">${p.likes} likes</div>
                    <div class="small">
                        <span class="fw-bold">${p.user}</span> ${p.caption}
                    </div>
                    <div class="text-muted small mt-2" style="cursor: pointer;">View all comments</div>
                </div>
            </div>
        `).join('');

        function toggleLike(btn) {
            btn.classList.toggle('fa-regular');
            btn.classList.toggle('fa-solid');
            btn.classList.toggle('active');
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
