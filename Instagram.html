<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone - Single File</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Navbar Styling */
        .navbar {
            height: 60px;
            border-bottom: 1px solid #dbdbdb !important;
        }
        .insta-logo {
            font-family: 'Grand Hotel', cursive;
            font-size: 28px;
            text-decoration: none;
            color: #262626;
        }

        /* Story Section */
        .story-container {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            margin-bottom: 24px;
        }
        .story-circle {
            width: 64px;
            height: 64px;
            background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            border-radius: 50%;
            padding: 2px;
            flex-shrink: 0;
            cursor: pointer;
        }
        .story-circle img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid white;
            object-fit: cover;
        }

        /* Post Styling */
        .post-card {
            background: white;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            margin-bottom: 24px;
        }
        .profile-pic-sm {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .post-img {
            width: 100%;
            max-height: 600px;
            object-fit: cover;
        }
        .icon-btn {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .icon-btn:hover {
            opacity: 0.7;
        }
        .liked {
            color: #ed4956;
        }

        /* Scrollbar Hide */
        .story-container::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="insta-logo" href="#">Instagram</a>
            
            <input type="text" class="form-control d-none d-md-block bg-light border-0" 
                   placeholder="Search" style="width: 250px; font-size: 14px;">

            <div class="d-flex gap-3 align-items-center">
                <i class="fa-solid fa-house fs-5 cursor-pointer"></i>
                <i class="fa-regular fa-paper-plane fs-5 cursor-pointer"></i>
                <i class="fa-regular fa-square-plus fs-5 cursor-pointer"></i>
                <i class="fa-regular fa-compass fs-5 cursor-pointer"></i>
                <i class="fa-regular fa-heart fs-5 cursor-pointer"></i>
                <img src="https://i.pravatar.cc/150?u=me" class="profile-pic-sm border" alt="profile">
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                
                <div class="story-container">
                    <div class="story-circle"><img src="https://i.pravatar.cc/150?u=1"></div>
                    <div class="story-circle"><img src="https://i.pravatar.cc/150?u=2"></div>
                    <div class="story-circle"><img src="https://i.pravatar.cc/150?u=3"></div>
                    <div class="story-circle"><img src="https://i.pravatar.cc/150?u=4"></div>
                    <div class="story-circle"><img src="https://i.pravatar.cc/150?u=5"></div>
                    <div class="story-circle"><img src="https://i.pravatar.cc/150?u=6"></div>
                </div>

                <div id="insta-feed"></div>

            </div>
        </div>
    </div>

    <script>
        const feedData = [
            {
                username: "coding_ninja",
                location: "Dubai, UAE",
                profilePic: "https://i.pravatar.cc/150?u=ninja",
                postImg: "https://picsum.photos/id/1/600/600",
                likes: "1,240",
                caption: "Late night coding sessions are the best! 💻🔥"
            },
            {
                username: "travel_vibes",
                location: "Santorini, Greece",
                profilePic: "https://i.pravatar.cc/150?u=travel",
                postImg: "https://picsum.photos/id/10/600/600",
                likes: "5,892",
                caption: "Dreaming of this sunset... 🌅 #travel"
            }
        ];

        const feedContainer = document.getElementById('insta-feed');

        function loadPosts() {
            feedContainer.innerHTML = feedData.map((post, index) => `
                <div class="post-card">
                    <div class="p-3 d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center gap-2">
                            <img src="${post.profilePic}" class="profile-pic-sm" alt="user">
                            <div>
                                <div class="fw-bold" style="font-size: 14px;">${post.username}</div>
                                <div class="text-muted" style="font-size: 12px;">${post.location}</div>
                            </div>
                        </div>
                        <i class="fa-solid fa-ellipsis"></i>
                    </div>

                    <img src="${post.postImg}" class="post-img" alt="post content">

                    <div class="p-3">
                        <div class="d-flex justify-content-between mb-2">
                            <div class="d-flex gap-3">
                                <i class="fa-regular fa-heart icon-btn like-btn" onclick="toggleLike(this)"></i>
                                <i class="fa-regular fa-comment icon-btn"></i>
                                <i class="fa-regular fa-paper-plane icon-btn"></i>
                            </div>
                            <i class="fa-regular fa-bookmark icon-btn"></i>
                        </div>
                        <div class="fw-bold mb-1" style="font-size: 14px;">${post.likes} likes</div>
                        <div style="font-size: 14px;">
                            <span class="fw-bold">${post.username}</span> ${post.caption}
                        </div>
                        <div class="text-muted mt-2" style="font-size: 12px; cursor: pointer;">
                            View all 24 comments
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleLike(element) {
            element.classList.toggle('fa-regular');
            element.classList.toggle('fa-solid');
            element.classList.toggle('liked');
        }

        // Initial Load
        loadPosts();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
