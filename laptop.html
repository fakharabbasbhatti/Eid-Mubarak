<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Laptop OS UI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --accent: #007aff;
      --glass: rgba(255, 255, 255, 0.15);
      --border: rgba(255, 255, 255, 0.2);
    }

    body {
      background: radial-gradient(circle at center, #2c3e50, #000);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      margin: 0;
      overflow: hidden;
    }

    .laptop-wrapper {
      perspective: 1500px;
      width: 850px;
    }

    /* Screen Design */
    .screen {
      background: #111;
      border-radius: 24px 24px 4px 4px;
      padding: 12px;
      border: 2px solid #333;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }

    .screen-inner {
      background: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&w=1200&q=80') center/cover;
      height: 480px;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }

    /* Top Bar */
    .top-bar {
      height: 30px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 15px;
      font-size: 12px;
      color: white;
    }

    /* Floating Windows */
    .window {
      position: absolute;
      top: 50px;
      left: 100px;
      width: 300px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      display: none;
      color: #333;
      z-index: 10;
      animation: zoomIn 0.3s ease;
    }

    .window-header {
      padding: 10px;
      background: #eee;
      border-radius: 12px 12px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .red { background: #ff5f56; }

    /* Taskbar */
    .dock-container {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--glass);
      backdrop-filter: blur(20px);
      padding: 8px 15px;
      border-radius: 18px;
      border: 1px solid var(--border);
      display: flex;
      gap: 20px;
    }

    .dock-icon {
      font-size: 24px;
      color: white;
      transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
    }

    .dock-icon:hover {
      transform: scale(1.5) translateY(-10px);
      color: var(--accent);
    }

    /* Keyboard Base */
    .keyboard {
      background: linear-gradient(180deg, #333 0%, #111 100%);
      height: 150px;
      width: 106%;
      margin-left: -3%;
      border-radius: 0 0 50px 50px;
      transform: rotateX(40deg);
      transform-origin: top;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .key-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .key {
      width: 45px; height: 40px; background: #222; border-radius: 8px;
      color: #555; font-size: 10px; display: flex; align-items: center;
      justify-content: center; box-shadow: 0 4px 0 #000;
      transition: 0.1s;
    }

    .key.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 0 15px var(--accent);
      transform: translateY(2px);
    }

    @keyframes zoomIn {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

<div class="laptop-wrapper">
  <div class="screen">
    <div class="screen-inner">
      
      <div class="top-bar">
        <div><i class="fab fa-apple"></i> <b>System</b></div>
        <div id="clock">12:00 PM</div>
        <div><i class="fas fa-wifi"></i> <i class="fas fa-battery-full ms-2"></i></div>
      </div>

      <div class="text-center mt-5 text-white">
        <h1 style="font-weight: 300; letter-spacing: 2px;">Welcome Bhatti</h1>
        <p style="opacity: 0.7;">Modern Professional Workspace</p>
      </div>

      <div id="settingsWin" class="window">
        <div class="window-header">
          <div class="dot red" onclick="closeWin('settingsWin')"></div>
          <small>System Settings</small>
          <span></span>
        </div>
        <div class="p-3">
          <h6>Appearance</h6>
          <hr>
          <p>Dark Mode: <b>Active</b></p>
          <button class="btn btn-sm btn-primary w-100" onclick="alert('Profile Updated!')">Update Profile</button>
        </div>
      </div>

      <div id="fileWin" class="window" style="left: 400px; width: 350px;">
        <div class="window-header">
          <div class="dot red" onclick="closeWin('fileWin')"></div>
          <small>File Explorer</small>
          <span></span>
        </div>
        <div class="p-3">
          <div class="d-flex gap-3">
             <i class="fas fa-folder fa-2x text-warning"></i>
             <div><b>Documents</b><br><small>12 Files</small></div>
          </div>
          <div class="d-flex gap-3 mt-3">
             <i class="fas fa-image fa-2x text-primary"></i>
             <div><b>Photos</b><br><small>450 Items</small></div>
          </div>
        </div>
      </div>

      <div class="dock-container">
        <i class="fas fa-th-large dock-icon" onclick="toggleWin('settingsWin')"></i>
        <i class="fas fa-folder-open dock-icon" onclick="toggleWin('fileWin')"></i>
        <i class="fab fa-chrome dock-icon"></i>
        <i class="fab fa-spotify dock-icon"></i>
        <i class="fas fa-terminal dock-icon"></i>
      </div>

    </div>
  </div>

  <div class="keyboard">
    <div class="key-row">
      <div class="key" id="key-q">Q</div><div class="key" id="key-w">W</div>
      <div class="key" id="key-e">E</div><div class="key" id="key-r">R</div>
      <div class="key" id="key-t">T</div><div class="key" id="key-y">Y</div>
      <div class="key" id="key-u">U</div><div class="key" id="key-i">I</div>
    </div>
    <div class="key-row">
      <div class="key" style="width: 250px;" id="key-space">SPACE BAR</div>
    </div>
  </div>
</div>

<script>
  // 1. Live Clock Functionality
  function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('clock').innerText = timeString;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // 2. Window Toggle Functions
  function toggleWin(id) {
    const win = document.getElementById(id);
    win.style.display = (win.style.display === 'block') ? 'none' : 'block';
  }

  function closeWin(id) {
    document.getElementById(id).style.display = 'none';
  }

  // 3. Realistic Keyboard Interaction
  document.addEventListener('keydown', (e) => {
    let keyId = 'key-' + e.key.toLowerCase();
    if(e.code === 'Space') keyId = 'key-space';
    
    const keyEl = document.getElementById(keyId);
    if(keyEl) {
      keyEl.classList.add('active');
      setTimeout(() => keyEl.classList.remove('active'), 150);
    }
  });
</script>

</body>
</html>
