<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Laptop OS UI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --accent: #0066ff;
      --accent-light: #3399ff;
      --accent-dark: #0052cc;
      --glass: rgba(255, 255, 255, 0.1);
      --glass-strong: rgba(255, 255, 255, 0.15);
      --border: rgba(255, 255, 255, 0.2);
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 50%, #16213e 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      overflow: hidden;
    }

    .laptop-wrapper {
      perspective: 1200px;
      width: 900px;
      animation: fadeInDown 0.8s ease-out;
    }

    /* Screen Design */
    .screen {
      background: #0a0a0a;
      border-radius: 28px 28px 8px 8px;
      padding: 14px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        0 0 60px rgba(0, 102, 255, 0.2),
        0 20px 60px rgba(0, 0, 0, 0.6);
    }

    .screen-inner {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      height: 500px;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .screen-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(0, 102, 255, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Top Bar - Enhanced */
    .top-bar {
      height: 36px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      font-size: 13px;
      color: #fff;
      font-weight: 500;
      position: relative;
      z-index: 5;
    }

    .top-bar-left, .top-bar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .top-bar i {
      opacity: 0.8;
      transition: 0.3s ease;
    }

    .top-bar i:hover {
      opacity: 1;
      color: var(--accent);
    }

    /* Welcome Section */
    .welcome-section {
      padding: 60px 30px 40px;
      text-align: center;
      position: relative;
      z-index: 3;
    }

    .welcome-section h1 {
      font-size: 48px;
      font-weight: 300;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 8px;
      animation: fadeInUp 0.8s ease-out 0.1s backwards;
    }

    .welcome-section p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
      animation: fadeInUp 0.8s ease-out 0.2s backwards;
    }

    /* Floating Windows - Enhanced */
    .window {
      position: absolute;
      top: 80px;
      left: 120px;
      width: 340px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(30px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      display: none;
      color: #fff;
      z-index: 20;
      animation: slideInWindow 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      overflow: hidden;
    }

    .window-header {
      padding: 14px 16px;
      background: linear-gradient(90deg, rgba(0, 102, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .window-header small {
      font-weight: 600;
      font-size: 13px;
      flex-grow: 1;
      margin-left: 12px;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .dot.red {
      background: linear-gradient(135deg, #ff5f56, #ff453a);
      box-shadow: 0 4px 12px rgba(255, 95, 86, 0.3);
    }

    .dot.red:hover {
      transform: scale(1.2);
    }

    .window-content {
      padding: 20px;
      max-height: 350px;
      overflow-y: auto;
    }

    .window-content h6 {
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 12px;
    }

    .window-content p {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 12px;
    }

    .window-content hr {
      border-color: var(--border);
      margin: 12px 0;
    }

    .btn-window {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      border: none;
      color: white;
      font-weight: 600;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      transition: all 0.3s ease;
      width: 100%;
    }

    .btn-window:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.4);
      background: linear-gradient(135deg, var(--accent-light) 0%, var(--accent) 100%);
    }

    .btn-window:active {
      transform: translateY(0);
    }

    .folder-item {
      display: flex;
      gap: 14px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      margin-bottom: 12px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .folder-item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateX(4px);
    }

    .folder-item i {
      font-size: 28px;
      flex-shrink: 0;
    }

    .folder-item b {
      font-weight: 600;
      font-size: 13px;
      color: #fff;
    }

    .folder-item small {
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }

    /* Dock/Taskbar - Enhanced */
    .dock-container {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--glass-strong);
      backdrop-filter: blur(30px);
      padding: 12px 20px;
      border-radius: 24px;
      border: 1px solid var(--border);
      display: flex;
      gap: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
      z-index: 15;
      animation: slideInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
    }

    .dock-icon {
      font-size: 24px;
      color: rgba(255, 255, 255, 0.7);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      position: relative;
    }

    .dock-icon:hover {
      transform: translateY(-14px) scale(1.3);
      color: var(--accent);
      filter: drop-shadow(0 8px 16px rgba(0, 102, 255, 0.3));
    }

    .dock-icon::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .dock-icon.active::after {
      opacity: 1;
    }

    /* Keyboard Base - Enhanced */
    .keyboard {
      background: linear-gradient(180deg, rgba(30, 30, 40, 0.8) 0%, rgba(10, 10, 15, 0.9) 100%);
      height: 160px;
      width: 107%;
      margin-left: -3.5%;
      border-radius: 0 0 56px 56px;
      border-top: 1px solid var(--border);
      transform: rotateX(42deg);
      transform-origin: top;
      box-shadow: 
        0 40px 80px rgba(0, 0, 0, 0.8),
        0 0 40px rgba(0, 102, 255, 0.1);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .key-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
    }

    .key {
      width: 48px;
      height: 44px;
      background: linear-gradient(180deg, #2a2a35 0%, #1a1a22 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #888;
      font-size: 10px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 
        0 4px 0 #000,
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      transition: all 0.08s ease;
      cursor: default;
    }

    .key:hover {
      background: linear-gradient(180deg, #333340 0%, #222229 100%);
      color: #aaa;
    }

    .key.active {
      background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
      color: white;
      box-shadow: 
        0 0px 0 #000,
        0 0 20px rgba(0, 102, 255, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transform: translateY(4px);
    }

    /* Animations */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideInWindow {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(-10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Scrollbar Styling */
    .window-content::-webkit-scrollbar {
      width: 6px;
    }

    .window-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .window-content::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .window-content::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

<div class="laptop-wrapper">
  <div class="screen">
    <div class="screen-inner">
      
      <div class="top-bar">
        <div class="top-bar-left">
          <i class="fab fa-apple"></i>
          <b>System</b>
        </div>
        <div id="clock">12:00 PM</div>
        <div class="top-bar-right">
          <i class="fas fa-wifi"></i>
          <i class="fas fa-battery-full"></i>
        </div>
      </div>

      <div class="welcome-section">
        <h1>Welcome, Bhatti</h1>
        <p>Your Professional Workspace Awaits</p>
      </div>

      <div id="settingsWin" class="window">
        <div class="window-header">
          <div class="dot red" onclick="closeWin('settingsWin')" title="Close"></div>
          <small>System Settings</small>
        </div>
        <div class="window-content">
          <h6>Appearance</h6>
          <p><i class="fas fa-moon" style="color: var(--accent); margin-right: 8px;"></i>Dark Mode: <b>Active</b></p>
          <hr>
          <h6>System</h6>
          <p style="font-size: 12px;">MacBook Pro 16" · M3 Pro · 18GB RAM</p>
          <button class="btn-window mt-3" onclick="alert('✨ Profile Updated Successfully!')">
            <i class="fas fa-refresh me-2"></i> Update Profile
          </button>
        </div>
      </div>

      <div id="fileWin" class="window" style="left: 440px; width: 360px;">
        <div class="window-header">
          <div class="dot red" onclick="closeWin('fileWin')" title="Close"></div>
          <small>File Explorer</small>
        </div>
        <div class="window-content">
          <div class="folder-item">
            <i class="fas fa-folder" style="color: var(--warning);"></i>
            <div>
              <b>Documents</b><br>
              <small>24 Files</small>
            </div>
          </div>
          <div class="folder-item">
            <i class="fas fa-image" style="color: var(--accent-light);"></i>
            <div>
              <b>Photos</b><br>
              <small>480 Items</small>
            </div>
          </div>
          <div class="folder-item">
            <i class="fas fa-music" style="color: #ec4899;"></i>
            <div>
              <b>Music</b><br>
              <small>156 Tracks</small>
            </div>
          </div>
          <div class="folder-item">
            <i class="fas fa-video" style="color: var(--success);"></i>
            <div>
              <b>Videos</b><br>
              <small>42 Files</small>
            </div>
          </div>
        </div>
      </div>

      <div class="dock-container">
        <i class="fas fa-th-large dock-icon" onclick="toggleWin('settingsWin')" title="Settings"></i>
        <i class="fas fa-folder-open dock-icon" onclick="toggleWin('fileWin')" title="Files"></i>
        <i class="fab fa-chrome dock-icon" title="Chrome"></i>
        <i class="fab fa-spotify dock-icon" title="Spotify"></i>
        <i class="fas fa-terminal dock-icon" title="Terminal"></i>
      </div>

    </div>
  </div>

  <div class="keyboard">
    <div class="key-row">
      <div class="key" id="key-q">Q</div>
      <div class="key" id="key-w">W</div>
      <div class="key" id="key-e">E</div>
      <div class="key" id="key-r">R</div>
      <div class="key" id="key-t">T</div>
      <div class="key" id="key-y">Y</div>
      <div class="key" id="key-u">U</div>
      <div class="key" id="key-i">I</div>
    </div>
    <div class="key-row">
      <div class="key" style="width: 240px;" id="key-space">SPACE</div>
    </div>
  </div>
</div>

<script>
  // 1. Live Clock Functionality
  function updateClock() {
    const now = new Date();
    const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    document.getElementById('clock').innerText = timeString;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // 2. Window Toggle Functions
  function toggleWin(id) {
    const win = document.getElementById(id);
    const icon = event.target.closest('.dock-icon');
    
    if(win.style.display === 'block') {
      win.style.display = 'none';
      if(icon) icon.classList.remove('active');
    } else {
      win.style.display = 'block';
      if(icon) icon.classList.add('active');
    }
  }

  function closeWin(id) {
    document.getElementById(id).style.display = 'none';
    // Remove active state from dock icon
    document.querySelectorAll('.dock-icon').forEach(icon => {
      icon.classList.remove('active');
    });
  }

  // 3. Realistic Keyboard Interaction
  document.addEventListener('keydown', (e) => {
    let keyId = 'key-' + e.key.toLowerCase();
    if(e.code === 'Space') keyId = 'key-space';
    
    const keyEl = document.getElementById(keyId);
    if(keyEl) {
      keyEl.classList.add('active');
    }
  });

  document.addEventListener('keyup', (e) => {
    let keyId = 'key-' + e.key.toLowerCase();
    if(e.code === 'Space') keyId = 'key-space';
    
    const keyEl = document.getElementById(keyId);
    if(keyEl) {
      keyEl.classList.remove('active');
    }
  });
</script>

</body>
</html>
