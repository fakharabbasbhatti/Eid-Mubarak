<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Laptop UI</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --laptop-body: #343a40;
      --screen-border: #111;
      --accent-color: #00d2ff;
    }

    body {
      background: linear-gradient(135deg, #1e1e2f 0%, #0f0f1a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      color: white;
    }

    /* Laptop Frame */
    .laptop-container {
      perspective: 1000px;
      width: 750px;
    }

    /* Screen Styles */
    .screen {
      background: var(--screen-border);
      border-radius: 20px 20px 5px 5px;
      padding: 15px;
      position: relative;
      box-shadow: 0 50px 100px rgba(0,0,0,0.5);
      border: 2px solid #444;
    }

    .screen-content {
      background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=800&q=80');
      background-size: cover;
      height: 420px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    /* Glassmorphism Effect */
    .overlay-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Keyboard Base */
    .keyboard-base {
      background: linear-gradient(to bottom, #444, #222);
      height: 140px;
      width: 105%;
      margin-left: -2.5%;
      border-radius: 0 0 40px 40px;
      position: relative;
      transform: rotateX(25deg);
      transform-origin: top;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 15px;
    }

    .keys-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .key {
      width: 45px;
      height: 35px;
      background: #111;
      border-radius: 6px;
      color: #777;
      font-size: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: inset 0 -3px 0 #333, 0 2px 5px rgba(0,0,0,0.5);
      transition: 0.1s;
      cursor: pointer;
    }

    .key:active {
      transform: translateY(2px);
      box-shadow: none;
    }

    /* Taskbar */
    .taskbar {
      position: absolute;
      bottom: 10px;
      width: 90%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(15px);
      border-radius: 12px;
      padding: 8px 20px;
      display: flex;
      justify-content: center;
      gap: 25px;
    }

    .taskbar i {
      font-size: 20px;
      color: rgba(255,255,255,0.8);
      transition: 0.3s;
      cursor: pointer;
    }

    .taskbar i:hover {
      color: var(--accent-color);
      transform: scale(1.2);
    }

    .btn-custom {
      background: var(--accent-color);
      border: none;
      color: white;
      padding: 10px 25px;
      border-radius: 30px;
      font-weight: 500;
      transition: 0.3s;
    }

    .btn-custom:hover {
      background: #0099cc;
      box-shadow: 0 0 15px rgba(0, 210, 255, 0.5);
    }
  </style>
</head>
<body>

<div class="laptop-container">
  <div class="screen">
    <div class="screen-content">
      <div class="overlay-card">
        <h2 class="mb-3">Welcome to OS</h2>
        <p class="mb-4">Smooth & Beautiful UI Design</p>
        <button class="btn btn-custom" onclick="showMessage()">Power Up ⚡</button>
        <p id="message" class="mt-3" style="min-height: 24px; font-weight: 300;"></p>
      </div>

      <div class="taskbar">
        <i class="fab fa-windows"></i>
        <i class="fas fa-search"></i>
        <i class="fas fa-chrome"></i>
        <i class="fas fa-code"></i>
        <i class="fas fa-folder-open"></i>
      </div>
    </div>
  </div>

  <div class="keyboard-base">
    <div class="keys-row">
      <div class="key">ESC</div>
      <div class="key">Q</div><div class="key">W</div><div class="key">E</div><div class="key">R</div>
      <div class="key">T</div><div class="key">Y</div><div class="key">U</div><div class="key">I</div>
    </div>
    <div class="keys-row">
      <div class="key" style="width: 60px;">TAB</div>
      <div class="key">A</div><div class="key">S</div><div class="key">D</div><div class="key">F</div>
      <div class="key">G</div><div class="key">H</div><div class="key">J</div><div class="key">K</div>
    </div>
    <div class="keys-row">
      <div class="key" style="width: 150px;">SPACE</div>
    </div>
  </div>
</div>

<script>
  function showMessage() {
    const msg = document.getElementById("message");
    msg.style.opacity = 0;
    setTimeout(() => {
      msg.innerText = "System online. Ready to build! 🚀";
      msg.style.opacity = 1;
    }, 200);
  }
</script>

</body>
</html>
